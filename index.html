<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>News – Blox Fruits</title>

    <link rel="shortcut icon" href="./BF_news.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">

    <style>
        @font-face {
            font-family: 'LuckiestGuy Regular';
            src: url('./fonts/LuckiestGuy-Regular.ttf') format('truetype');
            font-style: normal;
        }

        :root {
            --color-text: #333132;
            --color-border: #ebebeb;
            --font-stack-body: 'Inter', sans-serif;
            --color-primary: #ffda00;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--font-stack-body);
            color: var(--color-text);
            background-color: #ffffff;
        }

        /* ── NAVBAR ── */
        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 55px;
            background-color: #ffffff;
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            font-family: 'LuckiestGuy Regular', cursive;
        }
        .site-header__logo img { height: 45px; width: auto; display: block; }
        .site-nav { display: flex; gap: 25px; padding: 0; margin: 0; list-style: none; }
        .site-nav a { color: var(--color-text); text-decoration: none; font-weight: 700; font-size: 25px; text-transform: uppercase; }
        .site-header__icons { display: flex; gap: 20px; color: var(--color-text); cursor: pointer; }

        /* ── CONTENU PRINCIPAL ── */
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ── BANDEAU BLEU ── */
        .blue-banner {
            background-color: #175ec2;
            color: #ffffff;
            text-align: center;
            padding: 14px;
            font-size: 33px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            font-family: 'LuckiestGuy Regular', 'Luckiest Guy', cursive;
        }

        /* ── BARRE TITRE + PAGINATION ── */
        .pagination-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            gap: 14px;
        }
        .page-title {
            font-size: 40px;
            font-weight: 700;
            margin: 0;
            align-self: flex-start;
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: center;
            width: 100%;
        }
        .pagination-controls button {
            background-color: var(--color-primary);
            border: 2px solid #000;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background-color 0.15s;
            font-weight: 900;
        }
        .pagination-controls button:hover:not(:disabled) { transform: scale(1.08); }
        .pagination-controls button:disabled {
            background-color: #e0e0e0;
            border-color: #aaa;
            color: #aaa;
            cursor: not-allowed;
        }
        .pagination-info {
            font-size: 15px;
            font-weight: 700;
            color: #444;
            min-width: 60px;
            text-align: center;
        }

        /* ── GRILLE ── */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        /* ── CARTE ── */
        .news-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .news-card__image-wrapper {
            width: 100%;
            padding-top: 56.25%;
            position: relative;
            background-color: #f4f4f4;
        }
        .news-card__image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .news-card__content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .news-card__date {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .news-card__title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #111;
            line-height: 1.3;
        }
        .news-card__button {
            margin-top: auto;
            align-self: flex-start;
            background-color: var(--color-primary);
            color: #333132;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #000;
            font-size: 14px;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .news-card__button:hover { background-color: #e6c300; }

        /* ── PAGINATION BAS ── */
        .pagination-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-top: 40px;
            margin-bottom: 50px;
        }
        .pagination-bottom button {
            background-color: var(--color-primary);
            border: 2px solid #000;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            font-weight: 900;
        }
        .pagination-bottom button:hover:not(:disabled) { transform: scale(1.08); }
        .pagination-bottom button:disabled {
            background-color: #e0e0e0;
            border-color: #aaa;
            color: #aaa;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .site-header { padding: 15px 20px; }
            .site-nav { display: none; }
            .news-grid { grid-template-columns: 1fr; }
            .pagination-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-header__logo">
            <img src="./BF_news.png" alt="Blox Fruits">
        </div>
        <nav>
            <ul class="site-nav">
                <li><a href="https://www.roblox.com/fr/games/2753915549/Blox-Fruits">Game</a></li>
                <li><a href="#">DLC</a></li>
                <li><a href="./index.html">News</a></li>
            </ul>
        </nav>
        <div class="site-header__icons">
            <span class="material-symbols-outlined">search</span>
            <span class="material-symbols-outlined">person</span>
            <span class="material-symbols-outlined">shopping_bag</span>
        </div>
    </header>

    <main class="main-content">

        <div class="blue-banner">NeoNews</div>

        <!-- TITRE + FLÈCHES (haut) -->
        <div class="pagination-bar">
            <h1 class="page-title"></h1>
            <div class="pagination-controls">
                <button id="prev-top" onclick="changePage(-1)" disabled>←</button>
                <span class="pagination-info" id="page-info-top">1 / 4</span>
                <button id="next-top" onclick="changePage(1)">→</button>
            </div>
        </div>

        <!-- GRILLE DES CARTES -->
        <div class="news-grid" id="news-grid"></div>

        <!-- FLÈCHES BAS -->
        <div class="pagination-bottom">
            <button id="prev-bot" onclick="changePage(-1)" disabled>←</button>
            <span class="pagination-info" id="page-info-bot">1 / 4</span>
            <button id="next-bot" onclick="changePage(1)">→</button>
        </div>

    </main>

    <script>
        // ── LISTE DES BULLETINS ──
        const bulletins = [
            { num: "001", img: "./001/img/img_fruit.png",          href: "./001/bulletin-001.html" },
            { num: "002", img: "./002/img/1th_img.png",            href: "./002/bulletin-002.html" },
            { num: "003", img: "./003/img/1th_img.png",            href: "./003/bulletin-003.html" },
            { num: "004", img: "./004/img/1th_img.png",            href: "./004/bulletin-004.html" },
            { num: "005", img: "./005/img/bloxyNews1.png",         href: "./005/bulletin-005.html" },
            { num: "006", img: "./006/img/Thumbnail1Woohoo.png",   href: "./006/bulletin-006.html" },
            { num: "007", img: "./007/img/IndraCover.png",         href: "./007/bulletin-007.html" },
            { num: "008", img: "./008/img/ZiolesAuraFarm.png",     href: "./008/bulletin-008.html" },
            { num: "009", img: "./009/img/duel.png",               href: "./009/bulletin-009.html" },
            { num: "010", img: "./010/img/RipVSRed.png",           href: "./010/bulletin-010.html" },
            { num: "011", img: "./011/img/bulletin011cover.png",   href: "./011/bulletin-011.html" },
            { num: "012", img: "./012/img/hack.png",               href: "./012/bulletin-012.html" },
            { num: "013", img: "./013/img/BrokenShip.png",         href: "./013/bulletin-013.html" },
            { num: "014", img: "./014/img/rocket.png",             href: "./014/bulletin-014.html" },
            { num: "015", img: "./015/img/darkblade.png",          href: "./015/bulletin-015.html" },
            { num: "016", img: "./016/img/kraken.png",             href: "./016/bulletin-016.html" },
            { num: "017", img: "./017/halloween.png",              href: "./017/bulletin-017.html" },
            { num: "018", img: "./018/img/MysteryMan.png",         href: "./018/bulletin-018.html" },
            { num: "019", img: "./019/img/Mygame.png",             href: "./019/bulletin-019.html" },
        ];

        const PER_PAGE = 6;
        let currentPage = 1;
        const totalPages = Math.ceil(bulletins.length / PER_PAGE);

        function renderPage() {
            const grid = document.getElementById("news-grid");
            const start = (currentPage - 1) * PER_PAGE;
            const slice = bulletins.slice(start, start + PER_PAGE);

            grid.innerHTML = slice.map(b => `
                <article class="news-card">
                    <div class="news-card__image-wrapper">
                        <img src="${b.img}" class="news-card__image" alt="Bulletin #${b.num}">
                    </div>
                    <div class="news-card__content">
                        <div class="news-card__date">The Blox Bulletin – Issue ${b.num}</div>
                        <h2 class="news-card__title">The Blox Bulletin #${b.num}</h2>
                        <a href="${b.href}" class="news-card__button">Voir plus</a>
                    </div>
                </article>
            `).join("");

            const info = `${currentPage} / ${totalPages}`;
            document.getElementById("page-info-top").textContent = info;
            document.getElementById("page-info-bot").textContent = info;

            ["prev-top","prev-bot"].forEach(id =>
                document.getElementById(id).disabled = currentPage === 1);
            ["next-top","next-bot"].forEach(id =>
                document.getElementById(id).disabled = currentPage === totalPages);
        }

        function changePage(dir) {
            currentPage += dir;
            renderPage();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        renderPage();
    </script>

</body>
</html>
