<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>News – Blox Fruits</title>
    <link rel="icon" type="image/png" href="./shared/favicon.png">
    <link rel="shortcut icon" href="./shared/bf_logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        @font-face { font-family: 'LuckiestGuy Regular'; src: url('./fonts/LuckiestGuy-Regular.ttf') format('truetype'); }
        :root { --color-text: #1a1a2e; --color-border: #e8e8f0; --color-primary: #ffda00; --color-accent: #175ec2; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: var(--color-text); 
            background-color: #f0f2f8; 
            min-height: 100vh; 
        }

        .site-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;  
            pointer-events: none;
        }
        .site-background img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        @media (max-width: 768px) {
            .site-background { display: none; }
        }

        /* ── NAVBAR ── */
        .site-header {
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 55px;
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            height: 72px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: background 0.3s ease, backdrop-filter 0.3s ease;
        }

        /* Le logo ne change plus jamais de couleur */
        .site-header__logo img { 
            height: 42px; width: auto; display: block; filter: none !important; 
        }

        .site-nav { display: flex; gap: 8px; padding: 0; margin: 0; list-style: none; font-weight: 900; position: relative; z-index: 1; }
        .site-nav a, .site-header__icons {
            color: var(--color-text); text-shadow: none; transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .site-header.nav-light-text .site-nav a,
        .site-header.nav-light-text .site-header__icons {
            color: #ffffff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 0px 0 #000, -1px 0px 0 #000, 0px 1px 0 #000, 0px -1px 0 #000, 2px 2px 0 #000;
        }

        .site-nav a { text-decoration: none; font-size: 17px; text-transform: uppercase; font-family: 'LuckiestGuy Regular', cursive; padding: 8px 16px; border-radius: 10px; }
        .site-nav a.nav-news { color: #1a73e8; } .site-nav a.nav-leaks { color: #d93025; } .site-nav a:hover { background: var(--color-primary); color: #000; }
        .site-header__icons { display: flex; gap: 12px; cursor: pointer; align-items: center; position: relative; z-index: 1; }
        .site-header__icons span { padding: 8px; border-radius: 10px; transition: background 0.2s; }
        .site-header__icons span:hover { background: rgba(0,0,0,0.06); }
        
        /* Bouton Hamburger Mobile (Caché sur PC) */
        .mobile-menu-btn { display: none; }

        /* MENU DÉROULANT MOBILE (CACHÉ SUR PC) */
        .mobile-nav-dropdown { display: none; }
        
        /* MAIN */
        .main-content { max-width: 1240px; margin: 0 auto; padding: 40px 24px 80px; }
        
        /* PAGINATION PC (HAUT) */
        .pagination-bar { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 36px; }
        .page-title { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.4); letter-spacing: -0.5px; }
        .blue-banner { display: inline-block; background: linear-gradient(135deg, #175ec2, #2980d4, #175ec2); background-size: 200% auto; color: #fff; padding: 16px 60px; font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; box-shadow: 0 8px 32px rgba(23,94,194,0.45), 0 2px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2); animation: shimmerBanner 3s linear infinite; }
        @keyframes shimmerBanner { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .pagination-controls { display: flex; align-items: center; gap: 16px; justify-content: center; width: 100%; }
        .pagination-controls button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-controls button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-controls button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }
        .pagination-info { font-size: 16px; font-weight: 700; color: #fff; min-width: 70px; text-align: center; text-shadow: 0 1px 8px rgba(0,0,0,0.5); background: rgba(0,0,0,0.25); padding: 6px 16px; border-radius: 100px; backdrop-filter: blur(10px); }
        
        /* GRID & CARDS */
        .news-grid { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; }
        .news-card { width: 360px; max-width: 100%; border-radius: 24px; overflow: hidden; position: relative; cursor: pointer; background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease; display: flex; flex-direction: column; animation: fadeInUp 0.4s ease both; }
        .news-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 30px 80px rgba(23,94,194,0.25), 0 10px 30px rgba(0,0,0,0.15), 0 0 0 2px rgba(23,94,194,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .news-card__image-wrapper { width: 100%; padding-top: 58%; position: relative; overflow: hidden; background: #1a1a3e; }
        .news-card__image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .news-card:hover .news-card__image { transform: scale(1.08); }
        .news-card__image-wrapper::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.5) 100%); pointer-events: none; }
        .news-card__badge { position: absolute; top: 14px; left: 14px; background: var(--color-primary); color: #000; font-weight: 900; font-size: 13px; padding: 5px 12px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 1px; z-index: 2; border: 2px solid rgba(255,255,255,0.6); }
        .news-card__new { position: absolute; top: 14px; right: 14px; background: linear-gradient(135deg, #ff4d4d, #ff0000); color: #fff; font-weight: 900; font-size: 11px; padding: 4px 10px; border-radius: 100px; font-family: 'Inter', sans-serif; letter-spacing: 1px; text-transform: uppercase; z-index: 2; animation: pulseBadge 2s ease-in-out infinite; }
        @keyframes pulseBadge { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .news-card__content { padding: 22px 22px 20px; display: flex; flex-direction: column; flex-grow: 1; background: #fff; }
        .news-card__eyebrow { font-size: 11px; font-weight: 700; color: var(--color-accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .news-card__title { font-size: 20px; font-weight: 900; color: #111; line-height: 1.25; margin-bottom: 16px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 0.5px; }
        .news-card__button { margin-top: auto; align-self: flex-start; background: linear-gradient(135deg, #ffda00, #ffc200); color: #000; text-decoration: none; font-weight: 900; padding: 11px 24px; border-radius: 100px; font-size: 13px; text-transform: uppercase; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(255,218,0,0.4); border: 2px solid rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .news-card__button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: left 0.4s ease; }
        .news-card:hover .news-card__button::before { left: 100%; }
        .news-card:hover .news-card__button { background: linear-gradient(135deg, #ffe833, #ffda00); box-shadow: 0 6px 25px rgba(255,218,0,0.6); transform: translateX(3px); }
        .news-card__bar { height: 4px; background: linear-gradient(90deg, var(--color-accent), #5b9bd5, var(--color-primary)); background-size: 200% auto; animation: barSlide 3s linear infinite; }
        @keyframes barSlide { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        /* PAGINATION PC (BAS) */
        .pagination-bottom { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 50px; }
        .pagination-bottom button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-bottom button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-bottom button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }

        /* PILULE MOBILE (CACHÉE SUR PC) */
        .mobile-pagination-pill { display: none; }

        /* ── RESPONSIVE MOBILE ── */
        @media (max-width: 768px) { 
            .site-header { padding: 0 20px; height: auto; min-height: 60px; } 
            .site-nav { display: none; } 
            .mobile-menu-btn { display: block; }
            .news-grid { gap: 20px; } 
            .news-card { width: 100%; border-radius: 20px; } 
            .blue-banner { font-size: 24px; padding: 12px 30px; } 
            .page-title { font-size: 28px; }
            
            /* Cacher la pagination PC */
            .pagination-controls, .pagination-bottom { display: none !important; }

            /* MENU DÉROULANT MOBILE */
            .mobile-nav-dropdown {
                display: flex; flex-direction: column; gap: 12px;
                position: fixed; top: 60px; right: -280px; width: 250px;
                background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
                padding: 24px; border-radius: 0 0 0 20px; box-shadow: -5px 10px 30px rgba(0,0,0,0.1);
                transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999; border: 1px solid rgba(0,0,0,0.05); border-right: none;
            }
            .mobile-nav-dropdown.is-open { right: 0; }
            .mobile-nav-dropdown a {
                text-decoration: none; font-family: 'LuckiestGuy Regular', cursive; font-size: 18px;
                color: #111; text-align: center; padding: 12px; border-radius: 100px; border: 2px solid #e8e8f0;
                text-transform: uppercase; transition: all 0.2s;
            }
            .mobile-nav-dropdown a.active {
                background: #175ec2; color: #fff; border-color: transparent;
            }
            .mobile-nav-dropdown a.nav-news { color: #1a73e8; }
            .mobile-nav-dropdown a.nav-leaks { color: #d93025; }

            /* PILULE FLOTTANTE MOBILE */
            .mobile-pagination-pill {
                display: flex !important;
                position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9999;
                background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.3); padding: 4px 16px; border-radius: 50px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); gap: 15px; align-items: center;
                transition: background 0.3s, border-color 0.3s;
            }
            .mobile-pagination-pill button { background: transparent; border: none; color: #fff; font-size: 22px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.3s ease, background 0.2s ease; }
            .mobile-pagination-pill button:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
            .mobile-pagination-pill button:disabled { opacity: 0.3; cursor: not-allowed; }
            .mobile-pagination-pill .page-info { color: #fff; font-weight: 900; font-size: 14px; min-width: 50px; text-align: center; font-family: 'Inter', sans-serif; transition: color 0.3s ease; }

            /* Pilule fond clair (Adaptation automatique) */
            .mobile-pagination-pill.is-light { background: rgba(0, 0, 0, 0.1); border-color: rgba(0, 0, 0, 0.2); }
            .mobile-pagination-pill.is-light button, .mobile-pagination-pill.is-light .page-info { color: #000 !important; }
        }

        /* ── SPECIAL CARDS : GLITCH, HALLOWEEN, VALENTINE (TON CODE ORIGINAL) ── */
        .news-card.glitch-card, .news-card.valentine-card { isolation: isolate; }
        .news-card.glitch-card .news-card__image-wrapper, .news-card.glitch-card .news-card__content, .news-card.glitch-card .news-card__bar, .news-card.halloween-card .news-card__image-wrapper, .news-card.halloween-card .news-card__content, .news-card.halloween-card .news-card__bar, .news-card.valentine-card .news-card__image-wrapper, .news-card.valentine-card .news-card__content, .news-card.valentine-card .news-card__bar { position: relative; z-index: 2; }
        
        /* 012: glitch terminal */
        .news-card.glitch-card { background: #020402; border: 2px solid #00ff41; box-shadow: 0 0 24px rgba(0,255,65,0.7), 0 0 60px rgba(0,255,65,0.22), 0 18px 46px rgba(0,0,0,0.55); animation: fadeInUp 0.4s ease both, glitch-card-surge 2.8s steps(1) infinite; }
        .news-card.glitch-card::before { content: ""; position: absolute; inset: 0; z-index: 8; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,255,65,0.16) 0 1px, transparent 1px 4px), linear-gradient(90deg, transparent 0 42%, rgba(255,0,88,0.16) 43% 45%, transparent 46% 67%, rgba(0,140,255,0.16) 68% 70%, transparent 71%); mix-blend-mode: screen; animation: glitch-scan 4s linear infinite; }
        .news-card.glitch-card::after { content: "SYSTEM BREACH"; position: absolute; left: 0; right: 0; top: 46%; z-index: 9; color: rgba(0,255,65,0.7); font-family: 'Share Tech Mono', monospace; font-size: 12px; font-weight: 900; letter-spacing: 0; text-align: center; text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41; transform: skewX(-12deg); pointer-events: none; animation: glitch-warning 1.4s steps(2) infinite; }
        .news-card.glitch-card .news-card__image { filter: sepia(1) hue-rotate(82deg) saturate(420%) contrast(150%) brightness(0.86); transform: scale(1.12); animation: glitch-image-break 1.55s steps(1) infinite; }
        .news-card.glitch-card:hover .news-card__image { transform: scale(1.18); }
        .news-card.glitch-card .news-card__image-wrapper { background: #001100; }
        .news-card.glitch-card .news-card__image-wrapper::after { background: radial-gradient(circle at 50% 35%, transparent 0 30%, rgba(0,0,0,0.38) 62%, rgba(0,0,0,0.88) 100%); }
        .news-card.glitch-card .news-card__badge, .news-card.glitch-card .news-card__new { background: #000; color: #00ff41; border-color: #00ff41; box-shadow: 0 0 18px rgba(0,255,65,0.85); font-family: 'Share Tech Mono', monospace; letter-spacing: 0; }
        .news-card.glitch-card .news-card__new { color: #ff355d; border-color: #ff355d; animation: glitch-label-blink 1.2s steps(1) infinite; }
        .news-card.glitch-card .news-card__content { background: linear-gradient(180deg, #031006, #000); border-top: 1px solid rgba(0,255,65,0.6); }
        .news-card.glitch-card .news-card__eyebrow, .news-card.glitch-card .news-card__title { color: #00ff41; font-family: 'Share Tech Mono', monospace; letter-spacing: 0; text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41; animation: glitch-text-break 0.28s steps(2) infinite alternate; }
        .news-card.glitch-card .news-card__button { background: #000; color: #00ff41; border-color: #00ff41; border-radius: 10px; box-shadow: 0 0 18px rgba(0,255,65,0.62); font-family: 'Share Tech Mono', monospace; letter-spacing: 0; }
        .news-card.glitch-card:hover .news-card__button { background: #00ff41; color: #000; box-shadow: 0 0 28px #00ff41; }
        .news-card.glitch-card .news-card__bar { background: linear-gradient(90deg, #00ff41, #ff0058, #00a2ff, #00ff41); }

        /* 017 ── HALLOWEEN */
        .news-card.halloween-card { border-radius: 24px; overflow: clip; background: linear-gradient(165deg,#08000f 0%,#14002a 45%,#050010 100%); border: 2px solid rgba(160,55,255,0.78); box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset, 0 0 38px rgba(145,0,255,0.9), 0 0 85px rgba(105,0,210,0.44), 0 30px 80px rgba(0,0,0,0.75); animation: fadeInUp 0.4s ease both, hw-border-pulse 3s ease-in-out infinite; }
        .news-card.halloween-card::before { content: ""; position: absolute; left:-40px; right:-40px; bottom:-65px; top:auto; height: 140px; z-index: -1; pointer-events: none; border-radius: 0 0 60% 60%; background: radial-gradient(ellipse 62% 82% at 18% 100%, rgba(190,0,255,1) 0%, transparent 55%), radial-gradient(ellipse 58% 72% at 82% 100%, rgba(130,0,235,0.92) 0%, transparent 52%), radial-gradient(ellipse 42% 68% at 50% 100%, rgba(225,105,255,0.88)0%, transparent 50%), radial-gradient(ellipse 28% 52% at 28% 88%, rgba(165,0,255,0.72) 0%, transparent 46%), radial-gradient(ellipse 28% 52% at 72% 88%, rgba(205,65,255,0.72) 0%, transparent 46%), radial-gradient(ellipse 18% 36% at 8% 96%, rgba(100,0,205,0.62) 0%, transparent 43%), radial-gradient(ellipse 18% 36% at 92% 96%, rgba(155,0,255,0.62) 0%, transparent 43%); filter: blur(22px) saturate(2.2); animation: hw-fire-main 2s ease-in-out infinite; }
        .news-card.halloween-card::after { content: ""; position: absolute; left:-26px; right:-26px; bottom:-32px; top:auto; height: 85px; z-index: -1; pointer-events: none; border-radius: 0 0 52% 52%; background: radial-gradient(ellipse 36% 62% at 8% 100%, rgba(215,85,255,0.92) 0%, transparent 50%), radial-gradient(ellipse 30% 57% at 92% 100%, rgba(175,32,255,0.88) 0%, transparent 48%), radial-gradient(ellipse 48% 72% at 50% 100%, rgba(245,148,255,0.72) 0%, transparent 54%); filter: blur(15px) saturate(1.9); animation: hw-fire-top 2.6s ease-in-out infinite reverse; }
        .news-card.halloween-card .news-card__image-wrapper { background: #05000d; border-radius: 22px 22px 0 0; box-shadow: inset 0 -2px 0 rgba(180,80,255,0.82); overflow: hidden; }
        .news-card.halloween-card .news-card__image-wrapper::after { z-index: 4; border-radius: 22px 22px 0 0; background: radial-gradient(circle at 50% 50%, transparent 0 16%, rgba(0,0,0,0.46) 60%, rgba(0,0,0,0.9) 100%), radial-gradient(circle at 50% 4%, rgba(170,60,255,0.3) 0 32%, transparent 64%); }
        .news-card.halloween-card .news-card__image { filter: sepia(0.1) hue-rotate(258deg) saturate(280%) contrast(148%) brightness(0.65); transform: scale(1.1); transition: filter 0.4s ease, transform 0.5s ease; }
        .news-card.halloween-card:hover .news-card__image { filter: sepia(0.06) hue-rotate(262deg) saturate(370%) contrast(162%) brightness(0.9); transform: scale(1.19) rotate(-0.5deg); }
        .news-card.halloween-card:hover { box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 0 58px rgba(170,0,255,1), 0 0 125px rgba(115,0,225,0.62), 0 32px 90px rgba(0,0,0,0.82); }
        .news-card.halloween-card .news-card__badge, .news-card.halloween-card .news-card__new { background: rgba(6,0,14,0.93); color: #d090ff; border: 1px solid rgba(178,82,255,0.72); box-shadow: 0 0 22px rgba(158,0,255,0.92), inset 0 0 10px rgba(142,0,255,0.13); backdrop-filter: blur(8px); }
        .news-card.halloween-card .news-card__content { background: radial-gradient(circle at 86% 10%, rgba(150,0,255,0.19), transparent 36%), radial-gradient(circle at 12% 85%, rgba(110,0,212,0.12), transparent 32%), linear-gradient(180deg,#0b0016,#050009); border-top: 1px solid rgba(162,58,255,0.65); position: relative; z-index: 1; border-radius: 0 0 22px 22px; }
        .news-card.halloween-card .news-card__content::before { content: "🔮"; position: absolute; right:16px; top:12px; font-size: 28px; line-height:1; pointer-events:none; filter: drop-shadow(0 0 14px rgba(200,100,255,1)); animation: hw-orb-float 3.2s ease-in-out infinite; }
        .news-card.halloween-card .news-card__content::after { content: "🕷️"; position: absolute; left:15px; bottom:14px; font-size:18px; opacity:0.4; pointer-events:none; }
        .news-card.halloween-card .news-card__eyebrow { color: #b878ff; text-shadow: 0 0 12px rgba(185,80,255,0.85); letter-spacing: 1px; }
        .news-card.halloween-card .news-card__title { color: #ddb8ff; text-shadow: 0 0 22px rgba(190,80,255,1), 0 0 55px rgba(140,0,255,.7), 2px 0 rgba(110,0,210,0.5), -2px 0 rgba(230,130,255,0.4); animation: hw-title-haunt 5s ease-in-out infinite; }
        .news-card.halloween-card .news-card__button { background: linear-gradient(135deg,#180030,#6600cc 52%,#380060); color: #cc88ff; border: 1px solid rgba(165,70,255,0.62); border-radius: 100px; box-shadow: 0 0 22px rgba(140,0,255,0.7), inset 0 1px 0 rgba(210,140,255,0.25); overflow: hidden; }
        .news-card.halloween-card .news-card__button::before { background: linear-gradient(90deg,transparent,rgba(210,140,255,0.55),transparent); animation: hw-btn-shine 2.6s ease-in-out infinite; }
        .news-card.halloween-card:hover .news-card__button { background: linear-gradient(135deg,#9900ff,#6600cc 50%,#440088); color: #fff; box-shadow: 0 0 44px rgba(165,0,255,1), 0 0 92px rgba(122,0,212,0.56); }

<body>

    <div class="site-background">
        <picture>
            <source media="(min-width: 769px)" srcset="./shared/fond_bulletinpng.png">
            <img src="./shared/fond_bulletinpng.png" alt="Background">
        </picture>
    </div>

    <header class="site-header">
        <div class="site-header__logo"><img src="./BF_news.png" alt="Blox Fruits"></div>
        <nav>
            <ul class="site-nav">
                <li><a href="https://www.roblox.com/fr/games/2753915549/Blox-Fruits">Game</a></li>
                <li><a href="./index.html" class="nav-news">News</a></li>
                <li><a href="./neo_bulletin.html" class="nav-leaks">Leaks</a></li>
            </ul>
        </nav>
        <div class="site-header__icons">
            <span class="material-symbols-outlined mobile-menu-btn" id="menuToggle">menu</span>
        </div>
    </header>

    <div class="mobile-nav-dropdown" id="mobileNav">
        <a href="https://www.roblox.com/fr/games/2753915549/Blox-Fruits">Game</a>
        <a href="./index.html" class="nav-news active" style="background:#175ec2; color:#fff; border-color:transparent;">News</a>
        <a href="./neo_bulletin.html" class="nav-leaks">Leaks</a>
    </div>

    <main class="main-content">
        <div class="pagination-bar">
            <div class="blue-banner">Blox News</div>
            <div class="pagination-controls">
                <button id="prev-top" onclick="changePage(-1)" disabled>←</button>
                <span class="pagination-info" id="page-info-top">1 / 4</span>
                <button id="next-top" onclick="changePage(1)">→</button>
            </div>
        </div>
        
        <div class="news-grid" id="news-grid"></div>
        
        <div class="pagination-bottom">
            <button id="prev-bot" onclick="changePage(-1)" disabled>←</button>
            <span class="pagination-info" id="page-info-bot">1 / 4</span>
            <button id="next-bot" onclick="changePage(1)">→</button>
        </div>

        <div class="mobile-pagination-pill" id="pagination-mobile">
            <button id="prev-mobile" onclick="changePage(-1)">←</button>
            <span class="page-info" id="page-info-mobile">1 / 4</span>
            <button id="next-mobile" onclick="changePage(1)">→</button>
        </div>
    </main>

    <script>
        const bulletins = [
            { num: "001", img: "./001/img/img_fruit.png",          href: "./001/bulletin-001.html" },
            { num: "002", img: "./002/img/1th_img.png",            href: "./002/bulletin-002.html" },
            { num: "003", img: "./003/img/1th_img.png",            href: "./003/bulletin-003.html" },
            { num: "004", img: "./004/img/1th_img.png",            href: "./004/bulletin-004.html" },
            { num: "005", img: "./005/img/bloxyNews1.png",         href: "./005/bulletin-005.html" },
            { num: "006", img: "./006/img/Thumbnail1Woohoo.png",   href: "./006/bulletin-006.html" },
            { num: "007", img: "./007/img/IndraCover.png",         href: "./007/bulletin-007.html" },
            { num: "008", img: "./008/img/ZiolesAuraFarm.png",     href: "./008/bulletin-008.html" },
            { num: "009", img: "./009/img/duel.png",               href: "./009/bulletin-009.html" },
            { num: "010", img: "./010/img/RipVSRed.png",           href: "./010/bulletin-010.html" },
            { num: "011", img: "./011/img/bulletin011cover.png",   href: "./011/bulletin-011.html" },
            { num: "012", img: "./012/img/hack.png",               href: "./012/bulletin-012.html" },
            { num: "013", img: "./013/img/BrokenShip.png",         href: "./013/bulletin-013.html" },
            { num: "014", img: "./014/img/rocket.png",             href: "./014/bulletin-014.html" },
            { num: "015", img: "./015/img/darkblade.png",          href: "./015/bulletin-015.html" },
            { num: "016", img: "./016/img/kraken.png",             href: "./016/bulletin-016.html" },
            { num: "017", img: "./017/img/halloween.png",          href: "./017/bulletin-017.html" },
            { num: "018", img: "./018/img/MysteryMan.png",         href: "./018/bulletin-018.html" },
            { num: "019", img: "./019/img/Mygame.png",             href: "./019/bulletin-019.html" },
        ];
        const NEW_THRESHOLD = 4;
        const PER_PAGE = 6;
        let currentPage = 1;
        const totalPages = Math.ceil(bulletins.length / PER_PAGE);
        
        const specialCards = {
            "012": { className: "glitch-card", badge: "#012", status: "HACK", eyebrow: "Terminal compromis", title: "BULLETIN #012", button: "Accéder au terminal" },
            "017": { className: "halloween-card", badge: "#017", status: "HALLOWEEN", eyebrow: "Halloween Event", title: "BULLETIN #017", button: "Ouvrir la porte" },
            "019": { className: "valentine-card", badge: "#019", status: "SAINT-VALENTIN", eyebrow: "Saint-Valentin", title: "BULLETIN #019", button: "Lire la lettre" }
        };

        function renderPage() {
            const grid = document.getElementById("news-grid");
            const start = (currentPage - 1) * PER_PAGE;
            const slice = bulletins.slice(start, start + PER_PAGE);
            
            grid.innerHTML = slice.map((b, i) => {
                const special = specialCards[b.num] || {};
                const globalIndex = start + i;
                const isNew = globalIndex >= bulletins.length - NEW_THRESHOLD;
                const statusLabel = special.status || (isNew ? "Nouveau" : "");
                
                // INJECTION DES ANIMATIONS SPÉCIALES
                let deco = "";
                if (b.num === "017") {
                    deco = `<div class="hw-deco" aria-hidden="true"><span class="hw-bat" style="--bx:10%;--bd:-0.2s;--bt:-12px"></span><span class="hw-bat" style="--bx:60%;--bd:-2.4s;--bt:-8px"></span><span class="hw-bat" style="--bx:34%;--bd:-1.2s;--bt:-10px"></span><span class="hw-skull"></span></div>`;
                } else if (b.num === "019") {
                    deco = `<div class="val-deco" aria-hidden="true"><span class="val-heart" style="--hx:8%;--hd:-0.1s;--hs:1em"></span><span class="val-heart" style="--hx:28%;--hd:-1.7s;--hs:1.4em"></span><span class="val-heart" style="--hx:52%;--hd:-0.8s;--hs:.85em"></span><span class="val-heart" style="--hx:72%;--hd:-2.3s;--hs:1.2em"></span><span class="val-heart" style="--hx:88%;--hd:-0.5s;--hs:.96em"></span></div>`;
                }

                return `<article class="news-card ${special.className || ""}" onclick="window.location='${b.href}'">
                    ${deco}
                    <div class="news-card__image-wrapper">
                        <img src="${b.img}" class="news-card__image" alt="Bulletin #${b.num}">
                        <div class="news-card__badge">${special.badge || `#${b.num}`}</div>
                        ${statusLabel ? `<div class="news-card__new">${statusLabel}</div>` : ""}
                    </div>
                    <div class="news-card__content">
                        <div class="news-card__eyebrow">${special.eyebrow || "The Blox Bulletin"}</div>
                        <h2 class="news-card__title">${special.title || `Bulletin #${b.num}`}</h2>
                        <a href="${b.href}" class="news-card__button" onclick="event.stopPropagation()">${special.button || "Lire maintenant →"}</a>
                    </div>
                    <div class="news-card__bar"></div>
                </article>`;
            }).join("");

            // Mise à jour du texte
            const info = `${currentPage} / ${totalPages}`;
            document.getElementById("page-info-top").textContent = info;
            document.getElementById("page-info-bot").textContent = info;
            document.getElementById("page-info-mobile").textContent = info;

            // Désactivation des boutons
            document.getElementById("prev-top").disabled = currentPage === 1;
            document.getElementById("next-top").disabled = currentPage === totalPages;
            document.getElementById("prev-bot").disabled = currentPage === 1;
            document.getElementById("next-bot").disabled = currentPage === totalPages;
            document.getElementById("prev-mobile").disabled = currentPage === 1;
            document.getElementById("next-mobile").disabled = currentPage === totalPages;
        }

        function changePage(dir) {
            currentPage += dir;
            renderPage();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
        
        renderPage();

        // ── MENU HAMBURGER MOBILE ──
        const menuBtn = document.getElementById('menuToggle');
        const mobileNav = document.getElementById('mobileNav');
        if (menuBtn && mobileNav) {
            menuBtn.addEventListener('click', () => {
                mobileNav.classList.toggle('is-open');
                menuBtn.textContent = mobileNav.classList.contains('is-open') ? 'close' : 'menu';
            });
        }

        // ── NAVBAR SCROLL TEXTE BLANC ──
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.site-header');
            const darkZones = document.querySelectorAll('.blue-banner');
            let isOverDarkZone = false;
            const headerRect = header.getBoundingClientRect();
            darkZones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (rect.top < headerRect.bottom && rect.bottom > headerRect.top) isOverDarkZone = true;
            });
            header.classList.toggle('nav-light-text', isOverDarkZone);
        });

        // ── COULEUR PILULE FLOTTANTE MOBILE ──
        function updateMobilePaginationColor() {
            const pill = document.querySelector('.mobile-pagination-pill');
            if (!pill || window.innerWidth > 768) return;
            pill.style.pointerEvents = 'none';
            const rect = pill.getBoundingClientRect();
            const elementUnder = document.elementFromPoint(rect.left + rect.width / 2, rect.top + rect.height / 2);
            pill.style.pointerEvents = 'auto';
            if (!elementUnder) return;
            const bgColor = window.getComputedStyle(elementUnder).backgroundColor;
            const rgb = bgColor.match(/\d+/g);
            let isLight = false;
            if (rgb && rgb.length >= 3) {
                const brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;
                if (brightness > 180) isLight = true;
            }
            pill.classList.toggle('is-light', isLight);
        }
        window.addEventListener('scroll', updateMobilePaginationColor);
        window.addEventListener('resize', updateMobilePaginationColor);

    </script>
</body>
