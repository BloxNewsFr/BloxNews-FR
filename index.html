<!DOCTYPE html>
<html lang="fr">
<head>

    <style>
        @font-face { font-family: 'LuckiestGuy Regular'; src: url('./fonts/LuckiestGuy-Regular.ttf') format('truetype'); }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: var(--color-text); 
            background-color: #f0f2f8; 
            min-height: 100vh; 
        }

        .site-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;  
            pointer-events: none;
        }
        .site-background img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        @media (max-width: 768px) {
            .site-background { display: none; }
        }

        /* ── NAVBAR ── */
        /* ── NAVBAR FIXÉE ── */
        .site-header {
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 55px;
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            height: 72px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Le logo ne change plus jamais de couleur */
        .site-header__logo img { 
            height: 42px; 
            width: auto; 
            display: block; 
            filter: none !important; /* Force le maintien de l'apparence originale */
        }

        .site-nav { display: flex; gap: 8px; list-style: none; font-weight: 900; }
        .site-nav a { 
            text-decoration: none; 
            font-size: 17px; 
            text-transform: uppercase; 
            font-family: 'LuckiestGuy Regular', cursive; 
            padding: 8px 16px; 
            border-radius: 10px; 
            color: var(--color-text); /* Couleur par défaut */
            transition: color 0.3s ease;
        }

        /* Seul le texte du menu devient blanc quand nécessaire */
        .site-header.nav-light-text .site-nav a,
        .site-header.nav-light-text .site-header__icons {
            color: #ffffff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 0px 0 #000, -1px 0px 0 #000, 0px 1px 0 #000, 0px -1px 0 #000, 2px 2px 0 #000;
        }   


        .site-nav a { text-decoration: none; font-size: 17px; text-transform: uppercase; font-family: 'LuckiestGuy Regular', cursive; padding: 8px 16px; border-radius: 10px; }
        .site-nav a:hover { background: var(--color-primary); color: #000; }
        .site-header__icons { display: flex; gap: 12px; cursor: pointer; align-items: center; position: relative; z-index: 1; }
        .site-header__icons span { padding: 8px; border-radius: 10px; transition: background 0.2s; }
        .site-header__icons span:hover { background: rgba(0,0,0,0.06); }
        
        /* MAIN */
        .main-content { max-width: 1240px; margin: 0 auto; padding: 40px 24px 80px; }
        
        /* L'ANCIEN DESIGN PAGINATION PC (TOP) */
        .pagination-bar { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 36px; }
        .page-title { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.4); letter-spacing: -0.5px; }
        .blue-banner { display: inline-block; background: linear-gradient(135deg, #175ec2, #2980d4, #175ec2); background-size: 200% auto; color: #fff; padding: 16px 60px; font-size: 36px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; box-shadow: 0 8px 32px rgba(23,94,194,0.45), 0 2px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2); animation: shimmerBanner 3s linear infinite; }
        @keyframes shimmerBanner { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .pagination-controls { display: flex; align-items: center; gap: 16px; justify-content: center; width: 100%; }
        .pagination-controls button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-controls button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-controls button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }
        .pagination-info { font-size: 16px; font-weight: 700; color: #fff; min-width: 70px; text-align: center; text-shadow: 0 1px 8px rgba(0,0,0,0.5); background: rgba(0,0,0,0.25); padding: 6px 16px; border-radius: 100px; backdrop-filter: blur(10px); }
        
        /* GRID & CARDS */
        .news-grid { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; }
        .news-card { width: 360px; max-width: 100%; border-radius: 24px; overflow: hidden; position: relative; cursor: pointer; background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.35s ease; display: flex; flex-direction: column; animation: fadeInUp 0.4s ease both; }
        .news-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 30px 80px rgba(23,94,194,0.25), 0 10px 30px rgba(0,0,0,0.15), 0 0 0 2px rgba(23,94,194,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .news-card__image-wrapper { width: 100%; padding-top: 58%; position: relative; overflow: hidden; background: #1a1a3e; }
        .news-card__image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .news-card:hover .news-card__image { transform: scale(1.08); }
        .news-card__image-wrapper::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.5) 100%); pointer-events: none; }
        .news-card__badge { position: absolute; top: 14px; left: 14px; background: var(--color-primary); color: #000; font-weight: 900; font-size: 13px; padding: 5px 12px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 1px; z-index: 2; border: 2px solid rgba(255,255,255,0.6); }
        .news-card__new { position: absolute; top: 14px; right: 14px; background: linear-gradient(135deg, #ff4d4d, #ff0000); color: #fff; font-weight: 900; font-size: 11px; padding: 4px 10px; border-radius: 100px; font-family: 'Inter', sans-serif; letter-spacing: 1px; text-transform: uppercase; z-index: 2; }
        .news-card__content { padding: 22px 22px 20px; display: flex; flex-direction: column; flex-grow: 1; background: #fff; }
        .news-card__eyebrow { font-size: 11px; font-weight: 700; color: var(--color-accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .news-card__title { font-size: 20px; font-weight: 900; color: #111; line-height: 1.25; margin-bottom: 16px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 0.5px; }
        .news-card__button { margin-top: auto; align-self: flex-start; background: linear-gradient(135deg, #ffda00, #ffc200); color: #000; text-decoration: none; font-weight: 900; padding: 11px 24px; border-radius: 100px; font-size: 13px; text-transform: uppercase; transition: all 0.25s ease; border: 2px solid rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .news-card__bar { height: 4px; background: linear-gradient(90deg, var(--color-accent), #5b9bd5, var(--color-primary)); background-size: 200% auto; animation: barSlide 3s linear infinite; }
        @keyframes barSlide { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        /* L'ANCIEN DESIGN PAGINATION PC (BAS) */
        .pagination-bottom { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 50px; }
        .pagination-bottom button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-bottom button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-bottom button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }

        /* PAGINATION MOBILE (PILULE FLOTTANTE INTÉGRÉE) */
        .mobile-pagination-pill { display: none; } /* Cachée sur PC */

        @media (max-width: 768px) {
            .site-header { padding: 0 20px; height: auto; min-height: 60px; } 
            .site-nav { display: none; } 
            .news-grid { gap: 20px; } 
            .news-card { width: 100%; border-radius: 20px; } 
            .blue-banner { font-size: 24px; padding: 12px 30px; }
            .page-title { font-size: 28px; }
            
            /* Cacher la pagination PC */
            .pagination-controls, .pagination-bottom { display: none !important; }

            /* Afficher la pilule mobile */
            .mobile-pagination-pill {
                display: flex !important;
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 9999;
                background: rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.3);
                padding: 4px 16px;
                border-radius: 50px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                gap: 15px;
                align-items: center;
                transition: background 0.3s, border-color 0.3s;
            }

            .mobile-pagination-pill button {
                background: transparent;
                border: none;
                color: #fff;
                font-size: 22px;
                width: 40px;
                height: 40px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: color 0.3s ease, background 0.2s ease;
            }

            .mobile-pagination-pill button:hover:not(:disabled) {
                background: rgba(255,255,255,0.2);
            }

            .mobile-pagination-pill button:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }

            .mobile-pagination-pill .page-info {
                color: #fff;
                font-weight: 900;
                font-size: 14px;
                min-width: 50px;
                text-align: center;
                font-family: 'Inter', sans-serif;
                transition: color 0.3s ease;
            }

            /* Classe ajoutée en JS quand le fond est clair */
            .mobile-pagination-pill.is-light {
                background: rgba(0, 0, 0, 0.1);
                border-color: rgba(0, 0, 0, 0.2);
            }
            .mobile-pagination-pill.is-light button,
            .mobile-pagination-pill.is-light .page-info {
                color: #000 !important;
            }
        }

        /* SPECIAL CARDS (GLITCH, HALLOWEEN, VALENTINE) - conservés intacts */
        .news-card.glitch-card, .news-card.valentine-card { isolation: isolate; }
        .news-card.glitch-card .news-card__image-wrapper, .news-card.glitch-card .news-card__content, .news-card.glitch-card .news-card__bar, .news-card.halloween-card .news-card__image-wrapper, .news-card.halloween-card .news-card__content, .news-card.halloween-card .news-card__bar, .news-card.valentine-card .news-card__image-wrapper, .news-card.valentine-card .news-card__content, .news-card.valentine-card .news-card__bar { position: relative; z-index: 2; }
        .news-card.glitch-card { background: #020402; border: 2px solid #00ff41; box-shadow: 0 0 24px rgba(0,255,65,0.7), 0 0 60px rgba(0,255,65,0.22), 0 18px 46px rgba(0,0,0,0.55); animation: fadeInUp 0.4s ease both, glitch-card-surge 2.8s steps(1) infinite; }
        .news-card.glitch-card::before { content: ""; position: absolute; inset: 0; z-index: 8; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,255,65,0.16) 0 1px, transparent 1px 4px), linear-gradient(90deg, transparent 0 42%, rgba(255,0,88,0.16) 43% 45%, transparent 46% 67%, rgba(0,140,255,0.16) 68% 70%, transparent 71%); mix-blend-mode: screen; animation: glitch-scan 4s linear infinite; }
        .news-card.glitch-card::after { content: "SYSTEM BREACH"; position: absolute; left: 0; right: 0; top: 46%; z-index: 9; color: rgba(0,255,65,0.7); font-family: 'Share Tech Mono', monospace; font-size: 12px; font-weight: 900; text-align: center; text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41; transform: skewX(-12deg); pointer-events: none; animation: glitch-warning 1.4s steps(2) infinite; }
        .news-card.glitch-card .news-card__image { filter: sepia(1) hue-rotate(82deg) saturate(420%) contrast(150%) brightness(0.86); transform: scale(1.12); animation: glitch-image-break 1.55s steps(1) infinite; }
        .news-card.glitch-card .news-card__image-wrapper { background: #001100; }
        .news-card.glitch-card .news-card__badge, .news-card.glitch-card .news-card__new { background: #000; color: #00ff41; border-color: #00ff41; font-family: 'Share Tech Mono', monospace; }
        .news-card.glitch-card .news-card__new { color: #ff355d; border-color: #ff355d; }
        .news-card.glitch-card .news-card__content { background: linear-gradient(180deg, #031006, #000); border-top: 1px solid rgba(0,255,65,0.6); }
        .news-card.glitch-card .news-card__eyebrow, .news-card.glitch-card .news-card__title { color: #00ff41; font-family: 'Share Tech Mono', monospace; text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41; }
        .news-card.glitch-card .news-card__button { background: #000; color: #00ff41; border-color: #00ff41; border-radius: 10px; font-family: 'Share Tech Mono', monospace; }
        .news-card.glitch-card .news-card__bar { background: linear-gradient(90deg, #00ff41, #ff0058, #00a2ff, #00ff41); }

        .news-card.halloween-card { border-radius: 24px; overflow: clip; background: linear-gradient(165deg,#08000f 0%,#14002a 45%,#050010 100%); border: 2px solid rgba(160,55,255,0.78); animation: fadeInUp 0.4s ease both, hw-border-pulse 3s ease-in-out infinite; }
        .news-card.halloween-card::before { content: ""; position: absolute; left:-40px; right:-40px; bottom:-65px; height: 140px; z-index: -1; pointer-events: none; border-radius: 0 0 60% 60%; background: radial-gradient(ellipse 62% 82% at 18% 100%, rgba(190,0,255,1) 0%, transparent 55%); filter: blur(22px) saturate(2.2); animation: hw-fire-main 2s ease-in-out infinite; }
        .news-card.halloween-card .news-card__image-wrapper { background: #05000d; border-radius: 22px 22px 0 0; }
        .news-card.halloween-card .news-card__image { filter: sepia(0.1) hue-rotate(258deg) saturate(280%) contrast(148%) brightness(0.65); transform: scale(1.1); }
        .news-card.halloween-card .news-card__badge, .news-card.halloween-card .news-card__new { background: rgba(6,0,14,0.93); color: #d090ff; border: 1px solid rgba(178,82,255,0.72); backdrop-filter: blur(8px); }
        .news-card.halloween-card .news-card__content { background: linear-gradient(180deg,#0b0016,#050009); border-top: 1px solid rgba(162,58,255,0.65); position: relative; z-index: 1; border-radius: 0 0 22px 22px; }
        .news-card.halloween-card .news-card__eyebrow { color: #b878ff; text-shadow: 0 0 12px rgba(185,80,255,0.85); }
        .news-card.halloween-card .news-card__title { color: #ddb8ff; }
        .news-card.halloween-card .news-card__button { background: linear-gradient(135deg,#180030,#6600cc 52%,#380060); color: #cc88ff; border: 1px solid rgba(165,70,255,0.62); border-radius: 100px; }
        .news-card.halloween-card .news-card__bar { background: linear-gradient(90deg,#4400aa,#cc00ff,#8800ee,#5500bb,#4400aa); height: 5px; }

        .news-card.valentine-card { border-radius: 24px; background: linear-gradient(155deg,#1a0008 0%,#400015 40%,#180008 100%); border: 2px solid rgba(255,55,95,0.72); animation: fadeInUp 0.4s ease both, val-heartbeat 1.05s ease-in-out infinite; }
        .news-card.valentine-card .news-card__image-wrapper { background: #200008; border-radius: 22px 22px 0 0; }
        .news-card.valentine-card .news-card__image { filter: sepia(0.2) hue-rotate(320deg) saturate(200%) contrast(120%) brightness(0.78); transform: scale(1.07); }
        .news-card.valentine-card .news-card__badge, .news-card.valentine-card .news-card__new { background: rgba(30,0,12,0.92); color: #ff90b0; border: 1px solid rgba(255,58,98,0.62); }
        .news-card.valentine-card .news-card__content { background: linear-gradient(180deg,#1e000a,#100005); border-top: 1px solid rgba(255,48,88,0.62); position: relative; z-index:1; border-radius: 0 0 22px 22px; }
        .news-card.valentine-card .news-card__eyebrow { color: #ff6080; }
        .news-card.valentine-card .news-card__title { color: #ffccd8; }
        .news-card.valentine-card .news-card__button { background: linear-gradient(135deg,#800020,#cc0040 52%,#900030); color: #ffccd8; border: 1px solid rgba(255,58,98,0.58); border-radius: 100px; }
        .news-card.valentine-card .news-card__bar { background: linear-gradient(90deg,#cc0030,#ff3060,#ffb0c0,#ff3060,#cc0030); height: 5px; }

        @keyframes glitch-card-surge { 0%,100%{box-shadow:0 0 24px rgba(0,255,65,.7)} 48%{border-color:#ff0058}49%{border-color:#00ff41} }
        @keyframes hw-border-pulse{ 0%,100%{border-color:rgba(160,55,255,.78)} 50% {border-color:rgba(205,82,255,1)} }
        @keyframes val-heartbeat{ 0% {transform:scale(1)} 8% {transform:scale(1.034)} 16% {transform:scale(.994)} 24% {transform:scale(1.022)} 36% {transform:scale(1)} 100%{transform:scale(1)} }
    </style>
</head>

            { num: "019", img: "./019/img/Mygame.png",             href: "./019/bulletin-019.html" },
        ];
        const NEW_THRESHOLD = 4;
        const PER_PAGE = 6;
        let currentPage = 1;
        const totalPages = Math.ceil(bulletins.length / PER_PAGE);
        const specialCards = {
            "012": { className: "glitch-card", badge: "#012", status: "HACK", eyebrow: "Terminal compromis", title: "BULLETIN 12", button: "Accéder au terminal" },
            "017": { className: "halloween-card", badge: "#017", status: "HALLOWEEN", eyebrow: "Halloween Event", title: "La Nuit des Fruits Maudits", button: "Ouvrir la porte" },
            "019": { className: "valentine-card", badge: "#019", status: "SAINT-VALENTIN", eyebrow: "Saint-Valentin", title: "Le Bulletin Cœur Brisé", button: "Lire la lettre" }
        };

        function renderPage() {
            const grid = document.getElementById("news-grid");
            const start = (currentPage - 1) * PER_PAGE;
            const slice = bulletins.slice(start, start + PER_PAGE);
            
            // Génération de la grille des cartes
            grid.innerHTML = slice.map((b, i) => {
                const special = specialCards[b.num] || {};
                const globalIndex = start + i;
                const isNew = globalIndex >= bulletins.length - NEW_THRESHOLD;
                const statusLabel = special.status || (isNew ? "Nouveau" : "");
                
                // Décorations spéciales
                let deco = "";
                if (special.className === "halloween-card") {
                    deco = `<div class="hw-deco" aria-hidden="true"><span class="hw-bat" style="--bx:10%;--bd:-0.2s;--bt:-12px"></span><span class="hw-bat" style="--bx:60%;--bd:-2.4s;--bt:-8px"></span><span class="hw-bat" style="--bx:35%;--bd:-1.2s;--bt:-10px"></span><span class="hw-skull"></span></div>`;
                } else if (special.className === "valentine-card") {
                    deco = `<div class="val-deco" aria-hidden="true"><span class="val-heart" style="--hx:8%;--hd:-0.1s;--hs:1em"></span><span class="val-heart" style="--hx:28%;--hd:-1.7s;--hs:1.4em"></span><span class="val-heart" style="--hx:52%;--hd:-0.8s;--hs:.85em"></span><span class="val-heart" style="--hx:72%;--hd:-2.3s;--hs:1.2em"></span><span class="val-heart" style="--hx:88%;--hd:-0.5s;--hs:.96em"></span></div>`;
                }

                return `<article class="news-card ${special.className || ""}" onclick="window.location='${b.href}'">
                    ${deco}
                    <div class="news-card__image-wrapper">
                        <img src="${b.img}" class="news-card__image" alt="Bulletin #${b.num}">
                        <div class="news-card__badge">${special.badge || ` #${b.num}`}</div>
                        ${statusLabel ? `<div class="news-card__new">${statusLabel}</div>` : ""}
                    </div>
                    <div class="news-card__content">
                        <div class="news-card__eyebrow">${special.eyebrow || "The Blox Bulletin"}</div>
                        <h2 class="news-card__title">${special.title || `Bulletin #${b.num}`}</h2>
                        <a href="${b.href}" class="news-card__button" onclick="event.stopPropagation()">${special.button || "Lire maintenant →"}</a>
                    </div>
                    <div class="news-card__bar"></div>
                </article>`;
            }).join("");

            // Mise à jour du texte de pagination
            const info = `${currentPage} / ${totalPages}`;
            
            const infoTop = document.getElementById("page-info-top");
            if(infoTop) infoTop.textContent = info;
            
            const infoBot = document.getElementById("page-info-bot");
            if(infoBot) infoBot.textContent = info;

            const infoMobile = document.getElementById("page-info-mobile");
            if(infoMobile) infoMobile.textContent = info;

            // Activation/Désactivation des boutons
            ["prev-top", "prev-bot", "prev-mobile"].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.disabled = currentPage === 1;
            });
            ["next-top", "next-bot", "next-mobile"].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.disabled = currentPage === totalPages;
            });
        }

        function changePage(dir) {
            currentPage += dir;
            renderPage();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
        
        renderPage(); // Premier rendu au chargement

        // ── CHANGEMENT TEXTE NAVBAR AU SCROLL ──
        window.addEventListener('scroll', () => {
            const header = document.querySelector('.site-header');
            const darkZones = document.querySelectorAll('.blue-banner');
            
            let isOverDarkZone = false;
            const headerRect = header.getBoundingClientRect();
            
            darkZones.forEach(zone => {
                const rect = zone.getBoundingClientRect();
                if (rect.top < headerRect.bottom && rect.bottom > headerRect.top) {
                    isOverDarkZone = true;
                }
            });
            
            header.classList.toggle('nav-light-text', isOverDarkZone);
        });
        window.dispatchEvent(new Event('scroll'));

        // ── CHANGEMENT COULEUR PAGINATION MOBILE (NOIR/BLANC) AU SCROLL ──
        function updateMobilePaginationColor() {
            const pill = document.querySelector('.mobile-pagination-pill');
            if (!pill || window.innerWidth > 768) return;

            // Masquer temporairement la pilule pour "voir" l'élément en dessous
            pill.style.pointerEvents = 'none';
            
            const rect = pill.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const elementUnder = document.elementFromPoint(centerX, centerY);
            
            // Rétablir les événements clics sur la pilule
            pill.style.pointerEvents = 'auto';

            if (!elementUnder) return;

            const bgColor = window.getComputedStyle(elementUnder).backgroundColor;
            const rgb = bgColor.match(/\d+/g);
            
            let isLight = false;
            if (rgb && rgb.length >= 3) {
                // On vérifie si l'arrière-plan n'est pas complètement transparent
                const alpha = rgb.length === 4 ? parseFloat(rgb[3]) : 1;
                if (alpha > 0.1) {
                    // Calcul de luminosité (0 noir - 255 blanc)
                    const brightness = (parseInt(rgb[0]) * 299 + parseInt(rgb[1]) * 587 + parseInt(rgb[2]) * 114) / 1000;
                    if (brightness > 180) {
                        isLight = true;
                    }
                }
            }
            
            // Appliquer ou retirer la classe qui met le texte en noir
            if(isLight) {
                pill.classList.add('is-light');
            } else {
                pill.classList.remove('is-light');
            }
        }

        window.addEventListener('scroll', updateMobilePaginationColor);
        window.addEventListener('resize', updateMobilePaginationColor);
        // Exécuter une fois au chargement
        updateMobilePaginationColor();

    </script>
</body>
</html>
