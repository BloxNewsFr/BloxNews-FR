<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>News – Blox Fruits</title>
    <link rel="icon" type="image/png" href="./shared/favicon.png">
    <link rel="shortcut icon" href="./shared/bf_logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <style>
        @font-face { font-family: 'LuckiestGuy Regular'; src: url('./fonts/LuckiestGuy-Regular.ttf') format('truetype'); }
        :root { --color-text: #1a1a2e; --color-border: #e8e8f0; --color-primary: #ffda00; --color-accent: #175ec2; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--color-text); background-color: #f0f2f8; min-height: 100vh; }
        @media (min-width: 769px) {
            body { background-image: url('./shared/background2.jpeg'); background-repeat: no-repeat; background-position: center top; background-size: cover; background-attachment: fixed; }
        }
        /* NAVBAR */
        .site-header { display: flex; align-items: center; justify-content: space-between; padding: 0 55px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.6); position: sticky; top: 0; z-index: 1000; height: 72px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); }
        .site-header__logo img { height: 42px; width: auto; display: block; }
        .site-nav { display: flex; gap: 8px; padding: 0; margin: 0; list-style: none; }
        .site-nav a { color: var(--color-text); text-decoration: none; font-weight: 700; font-size: 17px; text-transform: uppercase; font-family: 'LuckiestGuy Regular', cursive; padding: 8px 16px; border-radius: 10px; transition: background 0.2s, color 0.2s; }
        .site-nav a:hover { background: var(--color-primary); color: #000; }
        .site-header__icons { display: flex; gap: 12px; color: var(--color-text); cursor: pointer; }
        .site-header__icons span { padding: 8px; border-radius: 10px; transition: background 0.2s; }
        .site-header__icons span:hover { background: rgba(0,0,0,0.06); }
        /* MAIN */
        .main-content { max-width: 1240px; margin: 0 auto; padding: 40px 24px 80px; }
        /* HEADER */
        .blue-banner { display: inline-block; background: linear-gradient(135deg, #175ec2, #2980d4, #175ec2); background-size: 200% auto; color: #fff; padding: 16px 60px; font-size: 36px; text-transform: uppercase; letter-spacing: 3px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; box-shadow: 0 8px 32px rgba(23,94,194,0.45), 0 2px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.2); animation: shimmerBanner 3s linear infinite; margin-bottom: 20px; }
        @keyframes shimmerBanner { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        /* PAGINATION */
        .pagination-bar { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 36px; }
        .page-title { font-size: 38px; font-weight: 900; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.4); letter-spacing: -0.5px; }
        .pagination-controls { display: flex; align-items: center; gap: 16px; justify-content: center; width: 100%; }
        .pagination-controls button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-controls button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-controls button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }
        .pagination-info { font-size: 16px; font-weight: 700; color: #fff; min-width: 70px; text-align: center; text-shadow: 0 1px 8px rgba(0,0,0,0.5); background: rgba(0,0,0,0.25); padding: 6px 16px; border-radius: 100px; backdrop-filter: blur(10px); }
        /* GRID */
        .news-grid { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; }
        /* CARD */
        .news-card { width: 360px; max-width: 100%; border-radius: 24px; overflow: hidden; position: relative; cursor: pointer; background: #fff; box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s ease; display: flex; flex-direction: column; animation: fadeInUp 0.4s ease both; }
        .news-card:hover { transform: translateY(-12px) scale(1.02); box-shadow: 0 30px 80px rgba(23,94,194,0.25), 0 10px 30px rgba(0,0,0,0.15), 0 0 0 2px rgba(23,94,194,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .news-card__image-wrapper { width: 100%; padding-top: 58%; position: relative; overflow: hidden; background: #1a1a3e; }
        .news-card__image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .news-card:hover .news-card__image { transform: scale(1.08); }
        .news-card__image-wrapper::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.15) 60%, rgba(0,0,0,0.5) 100%); pointer-events: none; }
        .news-card__badge { position: absolute; top: 14px; left: 14px; background: var(--color-primary); color: #000; font-weight: 900; font-size: 13px; padding: 5px 12px; border-radius: 100px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 1px; box-shadow: 0 3px 12px rgba(255,218,0,0.6); z-index: 2; border: 2px solid rgba(255,255,255,0.6); }
        .news-card__new { position: absolute; top: 14px; right: 14px; background: linear-gradient(135deg, #ff4d4d, #ff0000); color: #fff; font-weight: 900; font-size: 11px; padding: 4px 10px; border-radius: 100px; font-family: 'Inter', sans-serif; letter-spacing: 1px; text-transform: uppercase; z-index: 2; box-shadow: 0 3px 12px rgba(255,0,0,0.4); animation: pulseBadge 2s ease-in-out infinite; }
        @keyframes pulseBadge { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .news-card__content { padding: 22px 22px 20px; display: flex; flex-direction: column; flex-grow: 1; background: #fff; }
        .news-card__eyebrow { font-size: 11px; font-weight: 700; color: var(--color-accent); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
        .news-card__title { font-size: 20px; font-weight: 900; color: #111; line-height: 1.25; margin-bottom: 16px; font-family: 'LuckiestGuy Regular', cursive; letter-spacing: 0.5px; }
        .news-card__button { margin-top: auto; align-self: flex-start; background: linear-gradient(135deg, #ffda00, #ffc200); color: #000; text-decoration: none; font-weight: 900; padding: 11px 24px; border-radius: 100px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(255,218,0,0.4); border: 2px solid rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .news-card__button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: left 0.4s ease; }
        .news-card:hover .news-card__button::before { left: 100%; }
        .news-card:hover .news-card__button { background: linear-gradient(135deg, #ffe833, #ffda00); box-shadow: 0 6px 25px rgba(255,218,0,0.6); transform: translateX(3px); }
        .news-card__bar { height: 4px; background: linear-gradient(90deg, var(--color-accent), #5b9bd5, var(--color-primary)); background-size: 200% auto; animation: barSlide 3s linear infinite; }
        @keyframes barSlide { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        /* PAGINATION BAS */
        .pagination-bottom { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 50px; }
        .pagination-bottom button { background: rgba(255,255,255,0.95); border: none; border-radius: 50%; width: 48px; height: 48px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: all 0.2s ease; color: #111; }
        .pagination-bottom button:hover:not(:disabled) { background: var(--color-primary); transform: scale(1.12); box-shadow: 0 6px 20px rgba(255,218,0,0.5); }
        .pagination-bottom button:disabled { background: rgba(255,255,255,0.3); color: rgba(255,255,255,0.4); cursor: not-allowed; box-shadow: none; }
        @media (max-width: 768px) { .site-header { padding: 0 20px; height: auto; min-height: 60px; } .site-nav { display: none; } .news-grid { gap: 20px; } .news-card { width: 100%; border-radius: 20px; } .blue-banner { font-size: 24px; padding: 12px 30px; } .page-title { font-size: 28px; } }
    
        /* SPECIAL CARDS */
        .news-card.glitch-card,
        .news-card.halloween-card,
        .news-card.valentine-card { isolation: isolate; }

        .news-card.glitch-card .news-card__image-wrapper,
        .news-card.glitch-card .news-card__content,
        .news-card.glitch-card .news-card__bar,
        .news-card.halloween-card .news-card__image-wrapper,
        .news-card.halloween-card .news-card__content,
        .news-card.halloween-card .news-card__bar,
        .news-card.valentine-card .news-card__image-wrapper,
        .news-card.valentine-card .news-card__content,
        .news-card.valentine-card .news-card__bar { position: relative; z-index: 2; }

        /* 012: glitch terminal */
        .news-card.glitch-card {
            background: #020402;
            border: 2px solid #00ff41;
            box-shadow: 0 0 24px rgba(0,255,65,0.7), 0 0 60px rgba(0,255,65,0.22), 0 18px 46px rgba(0,0,0,0.55);
            animation: fadeInUp 0.4s ease both, glitch-card-surge 2.8s steps(1) infinite;
        }
        .news-card.glitch-card::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 8;
            pointer-events: none;
            background:
                repeating-linear-gradient(0deg, rgba(0,255,65,0.16) 0 1px, transparent 1px 4px),
                linear-gradient(90deg, transparent 0 42%, rgba(255,0,88,0.16) 43% 45%, transparent 46% 67%, rgba(0,140,255,0.16) 68% 70%, transparent 71%);
            mix-blend-mode: screen;
            animation: glitch-scan 4s linear infinite;
        }
        .news-card.glitch-card::after {
            content: "SYSTEM BREACH";
            position: absolute;
            left: 0;
            right: 0;
            top: 46%;
            z-index: 9;
            color: rgba(0,255,65,0.7);
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0;
            text-align: center;
            text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41;
            transform: skewX(-12deg);
            pointer-events: none;
            animation: glitch-warning 1.4s steps(2) infinite;
        }
        .news-card.glitch-card .news-card__image {
            filter: sepia(1) hue-rotate(82deg) saturate(420%) contrast(150%) brightness(0.86);
            transform: scale(1.12);
            animation: glitch-image-break 1.55s steps(1) infinite;
        }
        .news-card.glitch-card:hover .news-card__image { transform: scale(1.18); }
        .news-card.glitch-card .news-card__image-wrapper { background: #001100; }
        .news-card.glitch-card .news-card__image-wrapper::after {
            background: radial-gradient(circle at 50% 35%, transparent 0 30%, rgba(0,0,0,0.38) 62%, rgba(0,0,0,0.88) 100%);
        }
        .news-card.glitch-card .news-card__badge,
        .news-card.glitch-card .news-card__new {
            background: #000;
            color: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 18px rgba(0,255,65,0.85);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0;
        }
        .news-card.glitch-card .news-card__new {
            color: #ff355d;
            border-color: #ff355d;
            animation: glitch-label-blink 1.2s steps(1) infinite;
        }
        .news-card.glitch-card .news-card__content {
            background: linear-gradient(180deg, #031006, #000);
            border-top: 1px solid rgba(0,255,65,0.6);
        }
        .news-card.glitch-card .news-card__eyebrow,
        .news-card.glitch-card .news-card__title {
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0;
            text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41;
            animation: glitch-text-break 0.28s steps(2) infinite alternate;
        }
        .news-card.glitch-card .news-card__button {
            background: #000;
            color: #00ff41;
            border-color: #00ff41;
            border-radius: 10px;
            box-shadow: 0 0 18px rgba(0,255,65,0.62);
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0;
        }
        .news-card.glitch-card:hover .news-card__button { background: #00ff41; color: #000; box-shadow: 0 0 28px #00ff41; }
        .news-card.glitch-card .news-card__bar { background: linear-gradient(90deg, #00ff41, #ff0058, #00a2ff, #00ff41); }

        /* ══════════════════════════════════════════════════
           017 — HALLOWEEN  "HELLFIRE HUD"
           Octogone gaming UI · feu de lave orange/rouge
           Braises volantes · filtre apocalyptique · scan-lines
           ══════════════════════════════════════════════════ */
        .news-card.halloween-card {
            overflow: visible;
            background:
                repeating-linear-gradient(0deg,   rgba(255,70,0,0.028) 0 1px, transparent 1px 3px),
                repeating-linear-gradient(90deg,  rgba(255,70,0,0.028) 0 1px, transparent 1px 3px),
                radial-gradient(ellipse at 50% 100%, rgba(255,80,0,0.32) 0 18%, transparent 54%),
                linear-gradient(180deg, #0c0003 0%, #050001 100%);
            border: none;
            border-radius: 0;
            clip-path: polygon(
                22px 0%, calc(100% - 22px) 0%,
                100% 22px, 100% calc(100% - 22px),
                calc(100% - 22px) 100%, 22px 100%,
                0% calc(100% - 22px), 0% 22px
            );
            box-shadow: none;
            animation: fadeInUp 0.4s ease both, hw-fire-glow 3s ease-in-out infinite;
        }
        /* Lava pool — fond de la carte */
        .news-card.halloween-card::before {
            content: "";
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 80% 55% at 50% 105%, rgba(255,80,0,0.55) 0 18%, transparent 62%),
                radial-gradient(ellipse 45% 28% at 20% 105%, rgba(255,30,0,0.38) 0 14%, transparent 48%),
                radial-gradient(ellipse 45% 28% at 80% 105%, rgba(255,130,0,0.35) 0 14%, transparent 48%);
            animation: hw-lava-pulse 2.2s ease-in-out infinite;
        }
        /* Scan-lines + craquelures d'énergie orange */
        .news-card.halloween-card::after {
            content: "";
            position: absolute; inset: 0; z-index: 9; pointer-events: none;
            background:
                repeating-linear-gradient(0deg, rgba(255,80,0,0.08) 0 1px, transparent 1px 4px),
                linear-gradient(90deg,
                    transparent 0 9%,  rgba(255,60,0,0.1) 10% 11%,  transparent 12% 38%,
                    rgba(255,120,0,0.07) 39% 40%, transparent 41% 74%,
                    rgba(255,40,0,0.09) 75% 76%, transparent 77%);
            mix-blend-mode: screen;
            animation: hw-scan 5.5s linear infinite;
        }
        .news-card.halloween-card .news-card__image-wrapper {
            background: #04000c;
            border-radius: 0;
            box-shadow: inset 0 -4px 0 rgba(255,80,0,0.75);
            z-index: 1;
            overflow: hidden;
        }
        /* Coulée de lave sous l'image */
        .news-card.halloween-card .news-card__image-wrapper::before {
            content: "";
            position: absolute;
            bottom: -22px; left: 0; right: 0;
            height: 50px; z-index: 6; pointer-events: none;
            background:
                radial-gradient(ellipse 11px 26px at  7% 0%, #cc3300 0 58%, transparent 64%),
                radial-gradient(ellipse  7px 16px at 16% 0%, #ff6600 0 48%, transparent 56%),
                radial-gradient(ellipse 14px 32px at 27% 0%, #aa1e00 0 64%, transparent 70%),
                radial-gradient(ellipse  6px 14px at 36% 0%, #ee5500 0 44%, transparent 52%),
                radial-gradient(ellipse 16px 38px at 47% 0%, #bb2200 0 68%, transparent 74%),
                radial-gradient(ellipse  9px 20px at 57% 0%, #ff7700 0 54%, transparent 62%),
                radial-gradient(ellipse 13px 28px at 68% 0%, #cc3300 0 60%, transparent 67%),
                radial-gradient(ellipse  6px 15px at 77% 0%, #ff6600 0 46%, transparent 55%),
                radial-gradient(ellipse 15px 36px at 87% 0%, #aa1e00 0 66%, transparent 72%),
                radial-gradient(ellipse  8px 18px at 95% 0%, #ee5500 0 52%, transparent 60%);
            filter: drop-shadow(0 8px 12px rgba(255,80,0,0.98)) blur(0.6px);
            animation: hw-drip 2.5s ease-in-out infinite;
        }
        /* Vignette + halo de feu */
        .news-card.halloween-card .news-card__image-wrapper::after {
            z-index: 4;
            background:
                radial-gradient(circle at 50% 50%, transparent 0 14%, rgba(0,0,0,0.48) 55%, rgba(0,0,0,0.9) 100%),
                radial-gradient(circle at 50% 5%, rgba(255,80,0,0.32) 0 28%, transparent 58%);
        }
        .news-card.halloween-card .news-card__image {
            filter: sepia(0.65) hue-rotate(322deg) saturate(500%) contrast(185%) brightness(0.47);
            transform: scale(1.08);
            transition: filter 0.4s ease, transform 0.5s ease;
        }
        .news-card.halloween-card:hover .news-card__image {
            filter: sepia(0.45) hue-rotate(316deg) saturate(580%) contrast(200%) brightness(0.75);
            transform: scale(1.19) rotate(-0.6deg);
        }
        .news-card.halloween-card .news-card__badge {
            background: rgba(12,2,0,0.94);
            color: #ff7700;
            border: 1px solid rgba(255,100,0,0.72);
            border-radius: 3px;
            box-shadow: 0 0 15px rgba(255,80,0,0.92), inset 0 0 8px rgba(255,80,0,0.14);
            font-family: 'LuckiestGuy Regular', cursive;
            text-shadow: 0 0 8px rgba(255,130,0,0.95);
            backdrop-filter: blur(4px);
            animation: hw-badge-flicker 3.6s steps(1) infinite;
        }
        .news-card.halloween-card .news-card__new {
            background: rgba(100,0,0,0.92);
            color: #ffcc00;
            border: 1px solid rgba(255,160,0,0.62);
            border-radius: 3px;
            box-shadow: 0 0 18px rgba(255,180,0,0.82);
            animation: hw-new-blink 2.9s steps(1) infinite;
        }
        .news-card.halloween-card .news-card__content {
            background:
                radial-gradient(circle at 84% 10%, rgba(255,80,0,0.13), transparent 34%),
                radial-gradient(circle at 14% 90%, rgba(255,50,0,0.09), transparent 32%),
                linear-gradient(180deg, #0d0004, #060002);
            border-top: 1px solid rgba(255,80,0,0.58);
            position: relative; z-index: 1;
        }
        .news-card.halloween-card .news-card__content::before {
            content: "💀";
            position: absolute; right: 14px; top: 11px;
            font-size: 28px; line-height: 1;
            filter: drop-shadow(0 0 10px rgba(255,80,0,1));
            pointer-events: none;
            animation: hw-skull-bob 3.4s ease-in-out infinite;
        }
        .news-card.halloween-card .news-card__content::after {
            content: "🔥";
            position: absolute; left: 14px; bottom: 14px;
            font-size: 18px; opacity: 0.72;
            pointer-events: none;
            animation: hw-fire-bob 2.2s ease-in-out infinite;
        }
        .news-card.halloween-card .news-card__eyebrow {
            color: #ff9933;
            text-shadow: 0 0 10px rgba(255,130,0,0.82);
            letter-spacing: 2px;
        }
        .news-card.halloween-card .news-card__title {
            color: #ff7700;
            text-shadow:
                0 0 22px rgba(255,100,0,1),
                0 0 55px rgba(255,55,0,0.65),
                2px 2px 0 rgba(80,8,0,0.9);
            animation: hw-title-flicker 4.2s ease-in-out infinite;
        }
        .news-card.halloween-card .news-card__button {
            background: linear-gradient(135deg, #1a0002, #550008 52%, #240006);
            color: #ff9922;
            border: 1px solid rgba(255,100,0,0.65);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255,70,0,0.68), inset 0 1px 0 rgba(255,130,0,0.2);
            font-family: 'LuckiestGuy Regular', cursive;
            overflow: hidden;
        }
        .news-card.halloween-card .news-card__button::before {
            background: linear-gradient(90deg, transparent, rgba(255,140,0,0.6), transparent);
            animation: halloween-button-rune 2.5s ease-in-out infinite;
        }
        .news-card.halloween-card:hover .news-card__button {
            background: linear-gradient(135deg, #ff5500, #cc1c00 52%, #880000);
            color: #fff;
            box-shadow: 0 0 36px rgba(255,80,0,1), 0 0 75px rgba(255,50,0,0.55);
            transform: translateX(4px);
        }
        .news-card.halloween-card .news-card__bar {
            background: linear-gradient(90deg, #ff1a00, #ff8800, #ffcc00, #ff8800, #ff1a00);
            background-size: 300% auto;
            animation: barSlide 1.7s linear infinite;
            height: 5px; z-index: 1;
        }
        /* Braises volantes + chauves-souris (injected) */
        .hw-deco { position: absolute; inset: 0; z-index: 15; pointer-events: none; overflow: visible; }
        .hw-ember {
            position: absolute;
            bottom: var(--ey, 20%); left: var(--ex);
            width: var(--es, 3px); height: var(--es, 3px); border-radius: 50%;
            background: radial-gradient(circle, #ffee44 20%, #ff6600 80%);
            box-shadow: 0 0 5px 2px rgba(255,150,0,0.9);
            opacity: 0;
            animation: hw-ember-rise var(--ed, 2.5s) var(--eo, 0s) ease-out infinite;
        }
        .hw-bat { position: absolute; top: var(--bt,-8px); left: var(--bx); font-size: 16px; opacity: 0; animation: hw-bat-fly 5.5s calc(var(--bd)) ease-in-out infinite; filter: drop-shadow(0 0 5px rgba(255,80,0,0.85)); }
        .hw-bat::before { content: "🦇"; }

        /* ══════════════════════════════════════════════════
           019 — SAINT-VALENTIN  "VELVET LETTER"
           Forme lettre pliée · Velours bordeaux · or rosé
           Cœurs ascendants · sceau de cire · shimmer soie
           ══════════════════════════════════════════════════ */
        .news-card.valentine-card {
            overflow: visible;
            background:
                radial-gradient(ellipse at 28% 0%,   rgba(255,180,200,0.16), transparent 42%),
                radial-gradient(ellipse at 85% 100%, rgba(200,60,90,0.18),   transparent 38%),
                linear-gradient(158deg, #5e0018 0%, #3c000e 42%, #1e0008 100%);
            border: none; border-radius: 0;
            clip-path: polygon(0% 0%, calc(100% - 48px) 0%, 100% 48px, 100% 100%, 0% 100%);
            animation: fadeInUp 0.4s ease both, val-card-pulse 4.2s ease-in-out infinite;
        }
        /* Shimmer soie diagonal */
        .news-card.valentine-card::before {
            content: "";
            position: absolute; inset: 0; z-index: 1; pointer-events: none;
            background:
                linear-gradient(132deg,
                    transparent 0 42%,
                    rgba(255,200,215,0.28) 43% 45%,
                    transparent 46% 100%),
                repeating-linear-gradient(45deg,
                    transparent 0 22px,
                    rgba(220,120,140,0.04) 22px 23px),
                repeating-linear-gradient(-45deg,
                    transparent 0 22px,
                    rgba(255,240,245,0.06) 22px 23px);
            animation: val-shimmer 5s ease-in-out infinite;
        }
        /* Coin plié — triangle doré */
        .news-card.valentine-card::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 48px; height: 48px;
            z-index: 12; pointer-events: none;
            background: linear-gradient(
                225deg,
                rgba(230,190,120,0.9) 0 42%,
                rgba(180,100,80,0.7)  43% 58%,
                transparent           59%
            );
            filter: drop-shadow(-3px 3px 6px rgba(0,0,0,0.4));
        }
        .news-card.valentine-card .news-card__image-wrapper {
            background: #2e0010;
            border-radius: 0;
            box-shadow: inset 0 -3px 0 rgba(200,120,100,0.6);
            overflow: hidden;
        }
        /* Reflet doré en haut de l'image */
        .news-card.valentine-card .news-card__image-wrapper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 55px;
            z-index: 4; pointer-events: none;
            background: linear-gradient(180deg,
                rgba(220,170,100,0.28) 0%,
                rgba(180,60,80,0.12) 60%,
                transparent 100%);
            animation: val-gold-sheen 3.8s ease-in-out infinite;
        }
        /* Vignette rose bordeaux */
        .news-card.valentine-card .news-card__image-wrapper::after {
            z-index: 3;
            background:
                radial-gradient(circle at 50% 50%, transparent 0 22%, rgba(60,0,20,0.4) 60%, rgba(30,0,10,0.85) 100%),
                linear-gradient(180deg, rgba(220,120,100,0.1), rgba(180,40,60,0.32));
            animation: val-vignette-pulse 4s ease-in-out infinite;
        }
        .news-card.valentine-card .news-card__image {
            filter: sepia(0.28) hue-rotate(320deg) saturate(190%) contrast(118%) brightness(0.82);
            transform: scale(1.07);
            transition: filter 0.4s ease, transform 0.5s ease;
        }
        .news-card.valentine-card:hover .news-card__image {
            filter: sepia(0.15) hue-rotate(325deg) saturate(260%) contrast(128%) brightness(1.05);
            transform: scale(1.17) rotate(0.5deg);
        }
        .news-card.valentine-card .news-card__badge {
            background: rgba(30,5,10,0.94);
            color: #e8b870;
            border: 1px solid rgba(220,170,90,0.7);
            border-radius: 3px;
            box-shadow: 0 0 16px rgba(220,160,80,0.8), inset 0 0 6px rgba(220,150,60,0.12);
            text-shadow: 0 0 8px rgba(240,190,80,0.85);
            backdrop-filter: blur(4px);
            animation: val-gold-flicker 4s steps(1) infinite;
        }
        .news-card.valentine-card .news-card__new {
            background: rgba(90,0,30,0.94);
            color: #ffd0e0;
            border: 1px solid rgba(255,120,140,0.55);
            border-radius: 3px;
            box-shadow: 0 0 18px rgba(255,80,100,0.75);
            animation: val-new-pulse 3s ease-in-out infinite;
        }
        /* Zone de contenu — parchemin crème */
        .news-card.valentine-card .news-card__content {
            background:
                radial-gradient(circle at 80% 8%,  rgba(220,160,80,0.14), transparent 30%),
                radial-gradient(circle at 12% 88%, rgba(180,40,60,0.08),  transparent 28%),
                linear-gradient(180deg, #fff5ee, #f5e0e6);
            border-top: 2px solid rgba(200,150,80,0.45);
            position: relative; z-index: 1;
        }
        /* Sceau de cire — disque */
        .news-card.valentine-card .news-card__content::before {
            content: "";
            position: absolute; right: 14px; top: 12px;
            width: 44px; height: 44px; border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, rgba(255,240,220,0.7) 0 8px, #c0002a 10px 100%);
            box-shadow:
                0 0 0 2px rgba(200,150,60,0.6),
                0 0 22px rgba(180,20,50,0.7),
                0 4px 10px rgba(80,0,20,0.5);
            animation: val-seal-pulse 3.2s ease-in-out infinite;
            pointer-events: none;
        }
        /* Sceau de cire — ♥ */
        .news-card.valentine-card .news-card__content::after {
            content: "♥";
            position: absolute; right: 27px; top: 22px;
            color: rgba(255,220,220,0.95); font-size: 20px; line-height: 1;
            text-shadow: 0 0 6px rgba(200,0,40,0.8);
            pointer-events: none;
        }
        .news-card.valentine-card .news-card__eyebrow {
            color: #b04060;
            font-style: italic;
            text-transform: none;
            letter-spacing: 0.5px;
        }
        .news-card.valentine-card .news-card__title {
            color: #3a000e;
            font-family: 'LuckiestGuy Regular', cursive;
            text-shadow: 0 1px 0 rgba(255,220,220,0.8), 0 0 12px rgba(180,20,50,0.2);
        }
        .news-card.valentine-card .news-card__button {
            background: linear-gradient(135deg, #5e0015, #a01830 50%, #6e000f);
            color: #f0c090;
            border: 1px solid rgba(220,160,80,0.55);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(180,20,50,0.55), inset 0 1px 0 rgba(220,170,80,0.25);
            overflow: hidden;
        }
        .news-card.valentine-card .news-card__button::before {
            background: linear-gradient(90deg, transparent, rgba(230,185,100,0.5), transparent);
        }
        .news-card.valentine-card .news-card__button::after {
            content: "♥";
            position: absolute; right: 14px; top: 50%;
            color: rgba(240,180,120,0.9); font-size: 14px;
            transform: translateY(-50%) scale(0.7);
            opacity: 0; transition: opacity 0.25s, transform 0.25s;
        }
        .news-card.valentine-card:hover .news-card__button {
            background: linear-gradient(135deg, #e8c070, #d4a040 50%, #c08020);
            color: #2a0008;
            box-shadow: 0 0 32px rgba(220,160,60,0.9);
            padding-right: 36px;
        }
        .news-card.valentine-card:hover .news-card__button::after {
            opacity: 1; transform: translateY(-50%) scale(1); color: #8a0020;
        }
        .news-card.valentine-card .news-card__bar {
            background: linear-gradient(90deg, #c00028, #e8b060, #fff0d0, #e8b060, #c00028);
            background-size: 300% auto;
            animation: barSlide 3s linear infinite;
            height: 5px; z-index: 1;
        }
        /* Cœurs ascendants + étoiles (injected) */
        .val-deco { position: absolute; inset: 0; z-index: 14; pointer-events: none; overflow: hidden; border-radius: 0; }
        .val-heart {
            position: absolute; bottom: -20px; left: var(--hx);
            font-size: var(--hs, 1em); opacity: 0;
            filter: drop-shadow(0 0 5px rgba(200,40,80,0.7));
            animation: val-heart-rise 5s calc(var(--hd)) ease-in-out infinite;
        }
        .val-heart::before { content: "❤️"; }
        .val-heart:nth-child(3n)::before { content: "💕"; }
        .val-heart:nth-child(5n)::before { content: "🌹"; }
        .val-sparkle {
            position: absolute; left: var(--sx); top: var(--sy);
            pointer-events: none;
            animation: val-sparkle-pop 3.4s calc(var(--sd)) ease-in-out infinite;
        }
        .val-sparkle::before {
            content: "✦"; font-size: 14px;
            color: #e8c070;
            text-shadow: 0 0 8px rgba(220,160,60,0.95);
        }

        @keyframes glitch-card-surge {
            0%, 100% { box-shadow: 0 0 24px rgba(0,255,65,0.7), 0 0 60px rgba(0,255,65,0.22), 0 18px 46px rgba(0,0,0,0.55); }
            18% { box-shadow: 0 0 34px rgba(255,0,88,0.82), 0 0 70px rgba(0,255,65,0.26), 0 18px 46px rgba(0,0,0,0.55); }
            19% { box-shadow: 0 0 28px rgba(0,162,255,0.82), 0 0 70px rgba(0,255,65,0.26), 0 18px 46px rgba(0,0,0,0.55); }
            48% { border-color: #ff0058; }
            49% { border-color: #00ff41; }
        }
        @keyframes glitch-scan { 0% { background-position: 0 0, 0 0; } 100% { background-position: 0 220px, 120px 0; } }
        @keyframes glitch-warning {
            0%, 70%, 100% { opacity: 0; transform: translateX(0) skewX(-12deg); }
            72% { opacity: 1; transform: translateX(-14px) skewX(-12deg); }
            74% { opacity: 0.45; transform: translateX(12px) skewX(12deg); }
            76% { opacity: 1; transform: translateX(0) skewX(-12deg); }
        }
        @keyframes glitch-image-break {
            0%, 14%, 20%, 63%, 100% { transform: scale(1.12); filter: sepia(1) hue-rotate(82deg) saturate(420%) contrast(150%) brightness(0.86); }
            15% { transform: translateX(8px) skewX(-8deg) scale(1.18); filter: invert(1) hue-rotate(180deg) contrast(220%); }
            17% { transform: translateX(-8px) skewX(8deg) scale(1.16); filter: sepia(1) hue-rotate(120deg) saturate(520%) contrast(220%); }
            64% { transform: translateY(-5px) scale(1.2); filter: brightness(2.4) contrast(260%); }
            66% { transform: translateY(3px) scale(1.1); }
        }
        @keyframes glitch-label-blink { 0%, 55%, 100% { opacity: 1; } 56%, 62% { opacity: 0; } 63%, 66% { opacity: 1; } }
        @keyframes glitch-text-break {
            0% { transform: translate(0,0); text-shadow: 2px 0 #ff0058, -2px 0 #00a2ff, 0 0 14px #00ff41; }
            50% { transform: translate(1px,-1px); text-shadow: -3px 0 #ff0058, 3px 0 #00a2ff, 0 0 18px #00ff41; }
            100% { transform: translate(-1px,1px); }
        }
        @keyframes violet-fire-aura {
            0%, 100% { transform: translateY(10px) scaleX(1) skewX(0deg); opacity: 0.68; }
            34% { transform: translateY(-8px) scaleX(1.08) skewX(-4deg); opacity: 1; }
            68% { transform: translateY(1px) scaleX(0.96) skewX(5deg); opacity: 0.82; }
        }
        @keyframes violet-smoke-sweep {
            0%, 100% { transform: translateX(-80%) skewX(-18deg); opacity: 0; }
            42% { opacity: 0.8; }
            70% { transform: translateX(80%) skewX(-18deg); opacity: 0; }
        }
        @keyframes violet-flames-lick {
            0%, 100% { transform: translateY(10px) scaleY(0.92); opacity: 0.55; }
            44% { transform: translateY(-11px) scaleY(1.18); opacity: 0.95; }
            72% { transform: translateY(-2px) scaleY(1.04); opacity: 0.78; }
        }
        @keyframes halloween-portal-breathe {
            0%, 100% { opacity: 0.75; filter: saturate(1); }
            48% { opacity: 1; filter: saturate(1.35) brightness(1.08); }
        }
        @keyframes halloween-moon-float {
            0%, 100% { transform: translateY(0) rotate(-6deg); opacity: 0.62; }
            50% { transform: translateY(-5px) rotate(8deg); opacity: 1; }
        }
        @keyframes halloween-button-rune {
            0%, 55%, 100% { opacity: 0; transform: translateX(-120%); }
            68% { opacity: 0.85; transform: translateX(115%); }
        }
        @keyframes valentine-heartbeat {
            0%, 100% { transform: scale(1); }
            14% { transform: scale(1.022); }
            24% { transform: scale(1); }
            38% { transform: scale(1.04); }
            58% { transform: scale(1); }
        }
        @keyframes valentine-orbit-left {
            0%, 100% { transform: translate(0, 0) scale(0.9) rotate(-12deg); opacity: 0.62; }
            42% { transform: translate(15px, -12px) scale(1.25) rotate(10deg); opacity: 1; }
            72% { transform: translate(42px, 2px) scale(1) rotate(-4deg); opacity: 0.78; }
        }
        @keyframes valentine-orbit-right {
            0%, 100% { transform: translate(0, 0) scale(0.86) rotate(12deg); opacity: 0.58; }
            38% { transform: translate(-20px, -14px) scale(1.18) rotate(-8deg); opacity: 1; }
            72% { transform: translate(-46px, 4px) scale(0.98) rotate(7deg); opacity: 0.78; }
        }
        @keyframes valentine-heart-crown {
            0%, 100% { transform: translateY(0) scale(0.94); opacity: 0.72; letter-spacing: 6px; }
            42% { transform: translateY(-8px) scale(1.08); opacity: 1; letter-spacing: 10px; }
            70% { transform: translateY(3px) scale(1); opacity: 0.84; }
        }
        @keyframes valentine-image-glow {
            0%, 100% { opacity: 0.82; filter: saturate(1); }
            46% { opacity: 1; filter: saturate(1.28) brightness(1.08); }
        }
        @keyframes valentine-seal-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(255,47,125,0.62); }
            38% { transform: scale(1.1); box-shadow: 0 0 28px rgba(255,47,125,0.9); }
            58% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            .news-card.halloween-card,
            .news-card.valentine-card { width: calc(100% - 24px); }
        }

    
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header__logo"><img src="./BF_news.png" alt="Blox Fruits"></div>
        <nav><ul class="site-nav">
            <li><a href="https://www.roblox.com/fr/games/2753915549/Blox-Fruits">Game</a></li>
            <li><a href="#">DLC</a></li>
            <li><a href="./index.html">News</a></li>
            <li><a href="./neo_bulletin.html">Sneaks</a></li>
        </ul></nav>
        <div class="site-header__icons">
            <span class="material-symbols-outlined">search</span>
            <span class="material-symbols-outlined">person</span>
            <span class="material-symbols-outlined">shopping_bag</span>
        </div>
    </header>
    <main class="main-content">
        <div class="pagination-bar">
            <div class="blue-banner">NeoNews</div>
            <h1 class="page-title">Blox Bulletin Archive</h1>
            <div class="pagination-controls">
                <button id="prev-top" onclick="changePage(-1)" disabled>←</button>
                <span class="pagination-info" id="page-info-top">1 / 4</span>
                <button id="next-top" onclick="changePage(1)">→</button>
            </div>
        </div>
        <div class="news-grid" id="news-grid"></div>
        <div class="pagination-bottom">
            <button id="prev-bot" onclick="changePage(-1)" disabled>←</button>
            <span class="pagination-info" id="page-info-bot">1 / 4</span>
            <button id="next-bot" onclick="changePage(1)">→</button>
        </div>
    </main>
    <script>
        const bulletins = [
            { num: "001", img: "./001/img/img_fruit.png",          href: "./001/bulletin-001.html" },
            { num: "002", img: "./002/img/1th_img.png",            href: "./002/bulletin-002.html" },
            { num: "003", img: "./003/img/1th_img.png",            href: "./003/bulletin-003.html" },
            { num: "004", img: "./004/img/1th_img.png",            href: "./004/bulletin-004.html" },
            { num: "005", img: "./005/img/bloxyNews1.png",         href: "./005/bulletin-005.html" },
            { num: "006", img: "./006/img/Thumbnail1Woohoo.png",   href: "./006/bulletin-006.html" },
            { num: "007", img: "./007/img/IndraCover.png",         href: "./007/bulletin-007.html" },
            { num: "008", img: "./008/img/ZiolesAuraFarm.png",     href: "./008/bulletin-008.html" },
            { num: "009", img: "./009/img/duel.png",               href: "./009/bulletin-009.html" },
            { num: "010", img: "./010/img/RipVSRed.png",           href: "./010/bulletin-010.html" },
            { num: "011", img: "./011/img/bulletin011cover.png",   href: "./011/bulletin-011.html" },
            { num: "012", img: "./012/img/hack.png",               href: "./012/bulletin-012.html" },
            { num: "013", img: "./013/img/BrokenShip.png",         href: "./013/bulletin-013.html" },
            { num: "014", img: "./014/img/rocket.png",             href: "./014/bulletin-014.html" },
            { num: "015", img: "./015/img/darkblade.png",          href: "./015/bulletin-015.html" },
            { num: "016", img: "./016/img/kraken.png",             href: "./016/bulletin-016.html" },
            { num: "017", img: "./017/img/halloween.png",          href: "./017/bulletin-017.html" },
            { num: "018", img: "./018/img/MysteryMan.png",         href: "./018/bulletin-018.html" },
            { num: "019", img: "./019/img/Mygame.png",             href: "./019/bulletin-019.html" },
        ];
        const NEW_THRESHOLD = 4;
        const PER_PAGE = 6;
        let currentPage = 1;
        const totalPages = Math.ceil(bulletins.length / PER_PAGE);
        const specialCards = {
            "012": {
                className: "glitch-card",
                badge: "Issue #012",
                status: "GLITCH",
                eyebrow: "Terminal compromis",
                title: "PIRATÉ PAR QUEENA",
                button: "Accéder au terminal"
            },
            "017": {
                className: "halloween-card",
                badge: "Issue #017",
                status: "HALLOWEEN",
                eyebrow: "Halloween Event",
                title: "La Nuit des Fruits Maudits",
                button: "Ouvrir le portail"
            },
            "019": {
                className: "valentine-card",
                badge: "Issue #019",
                status: "CŒUR",
                eyebrow: "Saint-Valentin",
                title: "Le Bulletin Cœur Brisé",
                button: "Lire la lettre"
            }
        };

        function renderPage() {
            const grid = document.getElementById("news-grid");
            const start = (currentPage - 1) * PER_PAGE;
            const slice = bulletins.slice(start, start + PER_PAGE);
            const total = bulletins.length;
            grid.innerHTML = slice.map((b, i) => {
                const globalIndex = start + i;
                const special = specialCards[b.num] || {};
                const isNew = globalIndex >= total - NEW_THRESHOLD;
                const statusLabel = special.status || (isNew ? "Nouveau" : "");
                const delay = i * 0.07;
                return `<article class="news-card ${special.className || ""}" style="animation-delay:${delay}s" onclick="window.location='${b.href}'">
                    <div class="news-card__image-wrapper">
                        <img src="${b.img}" class="news-card__image" alt="Bulletin #${b.num}" loading="lazy">
                        <div class="news-card__badge">${special.badge || `Issue #${b.num}`}</div>
                        ${statusLabel ? `<div class="news-card__new">${statusLabel}</div>` : ""}
                    </div>
                    <div class="news-card__content">
                        <div class="news-card__eyebrow">${special.eyebrow || "The Blox Bulletin"}</div>
                        <h2 class="news-card__title">${special.title || `Bulletin #${b.num}`}</h2>
                        <a href="${b.href}" class="news-card__button" onclick="event.stopPropagation()">${special.button || "Lire maintenant →"}</a>
                    </div>
                    <div class="news-card__bar"></div>
                </article>`;
            }).join("");

            const info = `${currentPage} / ${totalPages}`;
            document.getElementById("page-info-top").textContent = info;
            document.getElementById("page-info-bot").textContent = info;
            ["prev-top","prev-bot"].forEach(id => document.getElementById(id).disabled = currentPage === 1);
            ["next-top","next-bot"].forEach(id => document.getElementById(id).disabled = currentPage === totalPages);
        }
        function changePage(dir) {
            currentPage += dir;
            renderPage();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }
        renderPage();
    </script>
</body>
</html>
