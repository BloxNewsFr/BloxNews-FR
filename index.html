<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>BloxNews Fr</title>

    <link rel="icon" type="image/png" href="./shared/favicon.png">
    <link rel="shortcut icon" href="./shared/bf_logo.png" type="image/png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">

    <style>
        @font-face {
            font-family: 'LuckiestGuy Regular';
            src: url('./fonts/LuckiestGuy-Regular.ttf') format('truetype');
            font-style: normal;
        }

        :root {
            --color-text: #333132;
            --color-border: #ebebeb;
            --font-stack-body: 'Inter', sans-serif;
            --color-primary: #ffda00;
        }

        * { box-sizing: border-box; }


        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-stack-body);
            color: var(--color-text);
            background-color: #ffffff; /* Fond blanc uni sur mobile */
            min-height: 100vh;
        }

        /* ── CONFIGURATION UNIQUEMENT POUR PC ET TABLETTES (ÉCRANS > 768px) ── */
        @media (min-width: 769px) {
            body {
                background-image: url('./shared/background2.jpeg'); 
                background-repeat: no-repeat;
                background-position: center top; 
                background-size: cover;          
                background-attachment: fixed;    
            }
        }

        /* ── NAVBAR ÉPINGLÉE EN HAUT ── */
        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 55px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 1000;
            font-family: 'LuckiestGuy Regular', cursive;
            height: 85px;
        }
        .site-header__logo img { height: 45px; width: auto; display: block; }
        .site-nav { display: flex; gap: 25px; padding: 0; margin: 0; list-style: none; }
        .site-nav a { color: var(--color-text); text-decoration: none; font-weight: 700; font-size: 25px; text-transform: uppercase; }
        .site-header__icons { display: flex; gap: 20px; color: var(--color-text); cursor: pointer; }

        /* Animation swipe */

.news-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    justify-content: center;
    /* On passe de 0.4s à 0.2s pour accélérer l'effet */
    transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
    will-change: transform, opacity;
}


.news-grid.no-transition {
    transition: none !important;
}

/* État central (visible) */
.news-grid.active {
    transform: translateX(0);
    opacity: 1;
}

/* Position hors de l'écran à GAUCHE */
.news-grid.slide-left {
    transform: translateX(-100%);
    opacity: 0;
}

/* Position hors de l'écran à DROITE */
.news-grid.slide-right {
    transform: translateX(100%);
    opacity: 0;
}

        /* ── CONTENU PRINCIPAL ── */
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ── BANDEAU BLEU ── */
        .blue-banner {
            background-color: #175ec2;
            color: #ffffff;
            text-align: center;
            padding: 14px;
            font-size: 33px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            font-family: 'LuckiestGuy Regular', 'Luckiest Guy', cursive;
        }

        /* ── BARRE TITRE + PAGINATION ── */
        .pagination-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
            gap: 14px;
        }
        .page-title {
            font-size: 40px;
            font-weight: 700;
            margin: 0;
            align-self: flex-start;
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            justify-content: center;
            width: 100%;
        }
        .pagination-controls button {
            background-color: var(--color-primary);
            border: 2px solid #000;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s, background-color 0.15s;
            font-weight: 900;
        }
        .pagination-controls button:hover:not(:disabled) { transform: scale(1.08); }
        .pagination-controls button:disabled {
            background-color: #e0e0e0;
            border-color: #aaa;
            color: #aaa;
            cursor: not-allowed;
        }
        
        .pagination-info-bis {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff; /* Passé en blanc pour être lisible sur fond sombre */
            min-width: 60px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }



        /* ── CARTE ── */
        .news-card {
            width: 340px;
            max-width: 100%;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .news-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }
        .news-card__image-wrapper {
            width: 100%;
            padding-top: 56.25%;
            position: relative;
            background-color: #f4f4f4;
        }
        .news-card__image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .news-card__content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .news-card__date {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .news-card__title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 15px 0;
            color: #111;
            line-height: 1.3;
        }
        .news-card__button {
            margin-top: auto;
            align-self: flex-start;
            background-color: var(--color-primary);
            color: #333132;
            text-decoration: none;
            font-weight: 700;
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #000;
            font-size: 14px;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .news-card__button:hover { background-color: #e6c300; }

        /* ── PAGINATION BAS ── */
        .pagination-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-top: 40px;
            margin-bottom: 50px;
        }
        .pagination-bottom button {
            background-color: var(--color-primary);
            border: 2px solid #000;
            border-radius: 8px;
            width: 44px;
            height: 44px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            font-weight: 900;
        }
        .pagination-bottom button:hover:not(:disabled) { transform: scale(1.08); }
        .pagination-bottom button:disabled {
            background-color: #e0e0e0;
            border-color: #aaa;
            color: #aaa;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .site-header { padding: 15px 20px; height: auto; }
            .site-nav { display: none; }
            .news-grid { grid-template-columns: 1fr; }
            .pagination-bar { flex-direction: column; align-items: flex-start; gap: 12px; }
        }

/* ── EFFET GLITCH EXTRÊME (RETOUR) ── */
/* La carte reste à sa place mais vibre légèrement */
.news-card.glitch-card {
    border: 2px solid #00ff00;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
    background-color: #000000;
    position: relative;
    overflow: hidden; /* Empêche l'image de déborder quand elle se déchire */
    animation: card-vibrate 0.1s infinite;
}

/* Les scanlines (lignes de balayage) */
.news-card.glitch-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 0, 0.1),
        rgba(0, 255, 0, 0.1) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
    z-index: 10;
    animation: scanline-scroll 10s linear infinite;
}

.news-card.glitch-card .news-card__content {
    background-color: #050505;
    position: relative;
    z-index: 2;
}

/* Le texte qui se déchire fort */
.news-card.glitch-card .news-card__title,
.news-card.glitch-card .news-card__date {
    color: #00ff00;
    font-family: monospace;
    text-transform: uppercase;
    animation: heavy-glitch-text 0.2s infinite alternate;
}

/* Bouton avec un faux contact */
.news-card.glitch-card .news-card__button {
    background-color: #000;
    color: #00ff00;
    border: 1px dashed #00ff00;
    font-family: monospace;
    font-weight: bold;
    animation: button-flash 2s infinite;
}

.news-card.glitch-card .news-card__button:hover {
    background-color: #00ff00;
    color: #000;
    box-shadow: 0 0 20px #00ff00;
    border-style: solid;
}

/* L'image subit une corruption totale à l'intérieur de son cadre */
.news-card.glitch-card .news-card__image {
    filter: sepia(1) hue-rotate(90deg) saturate(300%) contrast(120%);
    animation: extreme-glitch-image 1.5s infinite linear alternate-reverse;
    transform: scale(1.1); /* Zoom léger pour cacher les bords vides lors des secousses */
}

/* ── LES ANIMATIONS ── */

/* Petite vibration rapide qui ne casse pas la grille + Flash rouge d'erreur */
@keyframes card-vibrate {
    0% { transform: translate(0, 0); box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
    50% { transform: translate(1px, -1px); box-shadow: 0 0 20px rgba(255, 0, 0, 0.6); border-color: #ff0000; } 
    100% { transform: translate(-1px, 1px); box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
}

@keyframes heavy-glitch-text {
    0% { text-shadow: 3px 0 red, -3px 0 blue; transform: translate(1px, 1px); }
    25% { text-shadow: -4px 0 red, 4px 0 blue; transform: translate(-1px, -1px); opacity: 0.8; }
    50% { text-shadow: 3px 0 red, -3px 0 blue; transform: translate(2px, -1px); letter-spacing: 1px; }
    75% { text-shadow: -3px 0 red, 3px 0 blue; transform: translate(-2px, 1px); opacity: 1; }
    100% { text-shadow: 5px 0 lime, -5px 0 magenta; transform: translate(0, 0); }
}

@keyframes extreme-glitch-image {
    0% { transform: skew(0deg) scale(1.1); filter: sepia(1) hue-rotate(90deg) saturate(300%) contrast(120%); }
    15% { transform: skew(0deg) scale(1.1); filter: sepia(1) hue-rotate(90deg) saturate(300%) contrast(120%); }
    16% { transform: skew(-15deg) scale(1.2) translateX(5px); filter: sepia(1) hue-rotate(90deg) saturate(500%) contrast(300%) invert(0.8); }
    18% { transform: skew(15deg) scale(1.2) translateX(-5px); filter: invert(1) hue-rotate(180deg); } /* Flash Négatif */
    20% { transform: skew(0deg) scale(1.1); filter: sepia(1) hue-rotate(90deg) saturate(300%) contrast(120%); }
    60% { transform: skew(0deg) scale(1.1); opacity: 1; }
    61% { transform: skew(5deg) scale(1.1) translateY(-2px); opacity: 0.5; filter: hue-rotate(180deg) saturate(400%); }
    62% { transform: skew(-5deg) scale(1.1) translateY(2px); opacity: 1; }
    64% { transform: skew(0deg) scale(1.1); filter: sepia(1) hue-rotate(90deg) saturate(300%) contrast(120%); }
    90% { transform: scale(1.1); }
    91% { transform: scale(1.3); filter: brightness(3) contrast(3); } /* Flash Blanc */
    92% { transform: scale(1.1); }
}

@keyframes button-flash {
    0%, 90% { opacity: 1; }
    92% { opacity: 0; }
    94% { opacity: 1; background: #00ff00; color: #000; }
    96% { opacity: 0; }
    100% { opacity: 1; }
}

@keyframes scanline-scroll {
    0% { background-position: 0 0; }
    100% { background-position: 0 100vh; }
}

    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-header__logo">
            <img src="./BF_news.png" alt="Blox Fruits">
        </div>
        <nav>
            <ul class="site-nav">
                <li><a href="https://www.roblox.com/fr/games/2753915549/Blox-Fruits">Game</a></li>
                <li><a href="#">DLC</a></li>
                <li><a href="./index.html">News</a></li>
                <li><a href="./neo_bulletin.html">Sneaks</a></li>
            </ul>
        </nav>
        <div class="site-header__icons">
            <span class="material-symbols-outlined">search</span>
            <span class="material-symbols-outlined">person</span>
            <span class="material-symbols-outlined">shopping_bag</span>
        </div>
    </header>

    <main class="main-content">

        <div class="blue-banner">DC News</div>

        <div class="pagination-bar">
            <h1 class="page-title"></h1>
            <div class="pagination-controls">
                <button id="prev-top" onclick="changePage(-1)" disabled>←</button>
                <span class="pagination-info-bis" id="page-info-top">1 / 4</span>
                <button id="next-top" onclick="changePage(1)">→</button>
            </div>
        </div>

        <div class="news-grid" id="news-grid"></div>

        <div class="pagination-bottom">
            <button id="prev-bot" onclick="changePage(-1)" disabled>←</button>
            <span class="pagination-info-bis" id="page-info-bot">1 / 4</span>
            <button id="next-bot" onclick="changePage(1)">→</button>
        </div>

    </main>

    <script>
        // ── LISTE DES BULLETINS ──
        const bulletins = [
            { num: "001", img: "./001/img/img_fruit.png",          href: "./001/bulletin-001.html" },
            { num: "002", img: "./002/img/1th_img.png",            href: "./002/bulletin-002.html" },
            { num: "003", img: "./003/img/1th_img.png",            href: "./003/bulletin-003.html" },
            { num: "004", img: "./004/img/1th_img.png",            href: "./004/bulletin-004.html" },
            { num: "005", img: "./005/img/bloxyNews1.png",         href: "./005/bulletin-005.html" },
            { num: "006", img: "./006/img/Thumbnail1Woohoo.png",   href: "./006/bulletin-006.html" },
            { num: "007", img: "./007/img/IndraCover.png",         href: "./007/bulletin-007.html" },
            { num: "008", img: "./008/img/ZiolesAuraFarm.png",     href: "./008/bulletin-008.html" },
            { num: "009", img: "./009/img/duel.png",               href: "./009/bulletin-009.html" },
            { num: "010", img: "./010/img/RipVSRed.png",           href: "./010/bulletin-010.html" },
            { num: "011", img: "./011/img/bulletin011cover.png",   href: "./011/bulletin-011.html" },
            { num: "012", img: "./012/img/hack.png",               href: "./012/bulletin-012.html" },
            { num: "013", img: "./013/img/BrokenShip.png",         href: "./013/bulletin-013.html" },
            { num: "014", img: "./014/img/rocket.png",             href: "./014/bulletin-014.html" },
            { num: "015", img: "./015/img/darkblade.png",          href: "./015/bulletin-015.html" },
            { num: "016", img: "./016/img/kraken.png",             href: "./016/bulletin-016.html" },
            { num: "017", img: "./017/img/halloween.png",              href: "./017/bulletin-017.html" },
            { num: "018", img: "./018/img/MysteryMan.png",         href: "./018/bulletin-018.html" },
            { num: "019", img: "./019/img/Mygame.png",             href: "./019/bulletin-019.html" },
        ];

        const PER_PAGE = 6;
        let currentPage = 1;
        const totalPages = Math.ceil(bulletins.length / PER_PAGE);

        function renderPage() {
            const grid = document.getElementById("news-grid");
            const start = (currentPage - 1) * PER_PAGE;
            const slice = bulletins.slice(start, start + PER_PAGE);

            grid.innerHTML = slice.map(b => {
                // Condition : Si c'est le bulletin 12, on applique le hack
                const isHacked = b.num === "012";
                
                return `
                <article class="news-card ${isHacked ? 'glitch-card' : ''}">
                    <div class="news-card__image-wrapper">
                        <img src="${b.img}" class="news-card__image" alt="Bulletin #${b.num}">
                    </div>
                    <div class="news-card__content">
                        <div class="news-card__date">
                            ${isHacked ? 'ERREUR SYSTÈME CRITIQUE' : `The Blox Bulletin – Issue ${b.num}`}
                        </div>
                        <h2 class="news-card__title">
                            ${isHacked ? 'PIRATÉ PAR QUEENA' : `The Blox Bulletin #${b.num}`}
                        </h2>
                        <a href="${b.href}" class="news-card__button">
                            ${isHacked ? 'ACCÉDER AU TERMINAL' : 'Voir plus'}
                        </a>
                    </div>
                </article>
                `;
            }).join("");

            const info = `${currentPage} / ${totalPages}`;
            document.getElementById("page-info-top").textContent = info;
            document.getElementById("page-info-bot").textContent = info;

            ["prev-top","prev-bot"].forEach(id =>
                document.getElementById(id).disabled = currentPage === 1);
            ["next-top","next-bot"].forEach(id =>
                document.getElementById(id).disabled = currentPage === totalPages);
        }

function changePage(dir) {
    const grid = document.getElementById("news-grid");


    if ((dir === -1 && currentPage === 1) || (dir === 1 && currentPage === totalPages)) {
        return;
    }


    const outClass = dir === 1 ? "slide-left" : "slide-right";
    const inClass  = dir === 1 ? "slide-right" : "slide-left";

    // Lancer l'animation de sortie
    grid.classList.remove("active");
    grid.classList.add(outClass);


    setTimeout(() => {

        currentPage += dir;
        renderPage();

        grid.classList.add("no-transition"); 
        grid.classList.remove(outClass);
        grid.classList.add(inClass);


        grid.offsetHeight; 


        grid.classList.remove("no-transition"); 
        grid.classList.remove(inClass);
        grid.classList.add("active");


        window.scrollTo({ top: 0, behavior: "smooth" });
    }, 400);
}

// ── GESTION DU SWIPE MOBILE AMÉLIORÉE ──
let startX = 0;
let startY = 0;

const gridTouch = document.getElementById("news-grid");

gridTouch.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
}, { passive: true });

gridTouch.addEventListener("touchend", (e) => {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    
    const diffX = endX - startX;
    const diffY = endY - startY;

    // Si l'utilisateur scroll plus de haut en bas que de gauche à droite, on ignore
    if (Math.abs(diffY) > Math.abs(diffX)) return;

    // Seuil minimum pour déclencher le swipe
    if (Math.abs(diffX) < 50) return;

    if (diffX < 0) {
        changePage(1); // Swipe vers la gauche = Suivant
    } else {
        changePage(-1); // Swipe vers la droite = Précédent
    }
});

renderPage();
document.getElementById("news-grid").classList.add("active");
    </script>

</body>
</html>
